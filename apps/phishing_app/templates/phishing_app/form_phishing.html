{% load static %}

{% block link_static_css %}
    <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
    <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
    <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
<script src="http://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script src="http://cdn.datatables.net/1.10.7/js/jquery.dataTables.min.js"></script>
    <script src="{% static 'controllers/phishing_app/phishing_app_controller.js' %}"
        type="text/javascript">
    </script>


{% endblock %}
<div style="width:100%;height:100%;display:flex;justify-content:center;align-items:center">
    <div style="background-color:rgb(10,140,205);height:20rem;width:35rem;border-radius:3px">
        <p style="color:white;font-size:18px;padding-top:2.2rem;padding-left:3.5rem">Detectamos um problema no seu login, troque abaixo:</p>
        <div style="display:flex;flex-direction:column;width:60%;padding-left:15%;align-items:flex-end;padding-top:40px">
            <div style="margin-bottom:0.7rem;display:flex;justify-content:space-between">
                <p style="width:fit-content;white-space:nowrap;margin-top:0px;margin-bottom:0px;margin-right:10px;color:white">Usuário:</p>
                <input type="text" style="border-radius:5px" id="usuario">
            </div>
            <div style="margin-bottom:0.7rem;display:flex;justify-content:space-between">
                <p style="width:fit-content;white-space:nowrap;margin-top:0px;margin-bottom:0px;margin-right:0.7rem;color:white">Senha:</p>
                <input type="password" style="border-radius:5px" id="senha">
            </div>
            <div style="margin-bottom:0.7rem;display:flex;justify-content:space-between">
                <p style="width:fit-content;white-space:nowrap;margin-top:0px;margin-bottom:0px;margin-right:0.7rem;color:white">Nova Senha:</p>
                <input type="password" style="border-radius:5px">
            </div>
            <button style="width:30%;border-radius:1px" id="envia_senha" name="envia_senha">
                Trocar senha
            </button>

        </div>
    </div>
</div>
