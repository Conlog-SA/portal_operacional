{% load static %}
<link type="text/css" href="{% static '/teste/teste.css' %}" rel="stylesheet"/>

<form id="regForm" action="">

<h1>Register:</h1>

<!-- One "tab" for each step in the form: -->
<div class="tab">Form Inicial:
  <input type="hidden" id="hiddenTextoBotaoProximaTab0" value="Cadastro Motorista">
  <p><input placeholder="First name..." oninput="this.className = ''"></p>
  <p><input placeholder="Last name..." oninput="this.className = ''"></p>
</div>

<div class="tab">Cadastro Motorista:
  <input type="hidden" id="hiddenTextoBotaoProximaTab1" value="Cadastro Sinistro">
  <input type="hidden" id="hiddenTextoBotaoAnteriorTab1" value="Form Inicial">
  <p><input placeholder="E-mail..." oninput="this.className = ''"></p>
  <p><input placeholder="Phone..." oninput="this.className = ''"></p>
</div>

<div class="tab">Cadastro Sinistro:
  <input type="hidden" id="hiddenTextoBotaoProximaTab2" value="Informe Placa">
  <input type="hidden" id="hiddenTextoBotaoAnteriorTab2" value="Cadastro Motorista">
  <p><input placeholder="dd" oninput="this.className = ''"></p>
  <p><input placeholder="mm" oninput="this.className = ''"></p>
  <p><input placeholder="yyyy" oninput="this.className = ''"></p>
</div>

<div class="tab">Informe Placa:
  <input type="hidden" id="hiddenTextoBotaoProximaTab3" value="">
  <input type="hidden" id="hiddenTextoBotaoAnteriorTab3" value="Cadastro Sinistro">
  <p><input placeholder="Username..." oninput="this.className = ''"></p>
  <p><input placeholder="Password..." oninput="this.className = ''"></p>
</div>

<div style="overflow:auto;">
  <div style="float:right;">
    <button type="button" id="prevBtn" onclick="nextPrev(-1)">Previous</button>
    <button type="button" id="nextBtn" onclick="nextPrev(1)">Next</button>
  </div>
</div>

<!-- Circles which indicates the steps of the form: -->
<div style="text-align:center;margin-top:40px;">
  <span class="step"></span>
  <span class="step"></span>
  <span class="step"></span>
  <span class="step"></span>
</div>

</form>


<script src="{% static '/teste/teste.js' %}" type="text/javascript"></script>
