{% load static %}

<form class="d-flex justify-content-center align-items-center flex-column">
        {% csrf_token %}
          <input type="hidden" id="hd_indica_status_login" value="{{ cod_status_login }}">
          <input type="hidden" id="hd_msg_return" value="{{ msg_erro }}">

        <h1 class="homeApp__tituloPortal">Safety</h1>

        <div class="form__group field">
          <input required="" placeholder="CPF" class="form__field" type="input" id="input_cpf"
                 name="input_cpf" autofocus>
          <label class="form__label" for="input_cpf">CPF</label>
        </div>

        <div class="form__group field">
          <input required="" placeholder="Data de nascimento" class="form__field" type="date" id="input-data-nascimento" name="input-data-nascimento">
          <label class="form__label" for="input-data-nascimento">Dt. Nascimento</label>
        </div>

        <button type="button" id="btn_login_safety" name="btn_login_safety" onclick="" class="mt-5 btn btn-primary btn-login-safety">
            Entrar
        </button>
        <div class="form__group field">
            <h6>{{ msg }}</h6>
        </div>
          <div class="homeApp__sobre">
                <img class="conlog-logo" src="{% static 'img/logo-conlog.png'%}" alt="Logo Conlog"/>
                <img class="mt-2 homeApp_temValor" src="{% static 'img/tem-valor.png'%}" alt="Logo Conlog"/>
            </div>
      </form>
