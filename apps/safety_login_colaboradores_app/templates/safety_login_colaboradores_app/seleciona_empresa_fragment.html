<div class="d-flex flex-column justify-content-center align-items-center w-100 h-100 mb-3">
      <label style="font-size:20px;width:100%;padding: 0px 0px 15px 15px;max-width:604px;">Selecione a empresa:</label>

      <div class="d-flex flex-column w-100 align-items-center" style="padding:10px;">
        <form id="frm_selecione_empresa_conlog" name="frm_selecione_empresa_conlog"  method="GET" style="max-height:100%;justify-content:flex-end;width:100%;"
        class="d-flex flex-column align-items-center" action="{% url 'safe_pag_empresa' %}">
            <button type='submit' name='empresa' value="conlog" style="border-style:dotted;border-color:#f46424;border-width:3px;max-height:30vw;display:flex;flex-direction:column;background-color:rgba(244,100,36,0.1);width:100%;max-width:604px;"
                    onmouseover="troca_img_para_branca()" onmouseout="troca_img_para_preta()"
                    class='btn btn-rounded btn-space btn_conlog' title='Acessar como usuario CONLOG'>
                        <img class="img-logo-conlog" src="/static/img/logo_conlog_laranja.png" style="height:15vh;width:100%;max-width:566px;"/>
                        <img src="/static/img/tem-valor.png" style="width:100%;height:10vh;max-width:566px;"/>
            </button>
        </form>
        </div>

      <div class="d-flex flex-column w-100" style="max-height:40%;padding:10px;align-items:center;">
        <form id="frm_selecione_empresa_deep" name="frm_selecione_empresa_deep"  method="GET"
              class="d-flex flex-column align-items-center justify-content-between" style="height:100%;max-width:604px;width:100%;"
              action="{% url 'safe_pag_empresa' %}">
            <button type='submit' name='empresa' value="deep" style="padding:0px;width:100%;"
                class='btn btn-rounded btn-space btn_deep' title='Acessar como usuario DEEP'>
                <img src="/static/img/logo-deep-resized.png" style="width:100%;border-style:dotted;border-color:#3b8eed;border-radius:10px;height:25vh;max-height:30vw;background-color:rgba(56,142,237,0.1);"/>
            </button>
        </form>

      </div>
</div>
