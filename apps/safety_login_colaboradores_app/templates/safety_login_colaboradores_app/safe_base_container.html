{% extends 'base.html' %}
{% load static %}

{% block title %}
    Login | Portal Operacional
{% endblock %}

{% block link_static_css %}
  <link rel="stylesheet" href="{% static 'css/safe_login_colaboradores/safety_login_colaboradores.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/menu_app/menu_app.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/perfil-dropdown.css' %}" />
  <!-- Bootstrap select picker -->
  <link rel="stylesheet" href="{% static 'libs/bootstrap_select_1_14_0/css/bootstrap-select.css' %}"/>

  <!-- Bibliotecas Table-->
  <link defer   rel="stylesheet" href="{% static 'libs/jquery_3_6_0/css/dataTables.min.css' %}"/>

  <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
  <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
{% endblock %}

{% block conteudo %}
  <main id="main_container_safety" class="text-white justify-content-center align-items-center d-flex homeApp_loginContainer safety-container-screen">
    <form class="d-flex justify-content-center align-items-center flex-column">
        {% csrf_token %}
          <input type="hidden" id="hd_indica_status_login" value="{{ cod_status_login }}">
          <input type="hidden" id="hd_msg_return" value="{{ msg_erro }}">

        <div style="display:flex">
            <i class="fa-solid fa-helmet-safety" style="font-size:40px;color:#f46424"></i>
            &nbsp;
            <h1 class="homeApp__tituloPortal">Safety</h1>
        </div>

        <div class="form__group field">
          <input required="" placeholder="CPF" class="form__field" type="input" id="input_cpf"
                 name="input_cpf" autofocus>
          <label class="form__label" for="input_cpf">CPF</label>
        </div>

        <div class="form__group field">
          <input required placeholder="Teste" class="form__field input-data-nascimento" id="input-data-nascimento" name="input-data-nascimento" maxlength="10" inputmode="numeric">
          <label class="form__label" for="input-data-nascimento">Dt. Nascimento</label>
        </div>

        <button type="button" id="btn_login_safety" name="btn_login_safety" onclick="" class="mt-5 btn btn-primary btn-login-safety">
            Entrar
        </button>
        <div class="form__group field">
            <h6>{{ msg }}</h6>
        </div>
          <div class="homeApp__sobre">
                <img class="conlog-logo" src="{% static 'img/logo-conlog.png'%}" alt="Logo Conlog"/>
                <img class="mt-2 homeApp_temValor" src="{% static 'img/tem-valor.png'%}" alt="Logo Conlog"/>
          </div>
      </form>
  </main>
{% endblock %}

{% block link_static_js %}
  <script src="{% static 'controllers/safety_login_colaboradores/frm_safety_login.js' %}"
        type="text/javascript">
    </script>
  <script defer  src="{% static 'libs/bootstrap_select_1_14_0/js/bootstrap-select.js' %}"></script>
  <script src="{% static 'controllers/safety_gab_op_emp_app/frm_gab_op_emp_app.js' %}"
          type="text/javascript">
  </script>
  <script src="{% static 'controllers/safety_relatos_app/frm_relatos_app.js' %}"
          type="text/javascript">
  </script>
  <script src="{% static 'controllers/safety_gsdpq_app/frm_gsdpq_app.js' %}"
          type="text/javascript">
  </script>
  <script src="{% static 'controllers/safety_blitz_trajeto_carro_app/frm_blitz_trajeto_carro_app.js' %}"
          type="text/javascript">
  </script>
 <script src="{% static 'libs/browser-image-compression/browser-image-compression.js' %}"
          type="text/javascript">
  </script>
  <script src="{% static 'controllers/safety_checks_aplicados_app/frm_checks_aplicados_app.js' %}?v='1.0' %}"
          type="text/javascript">
  </script>
{% endblock %}
