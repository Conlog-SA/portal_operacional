{% load static %}

{% block link_static_css %}
    <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
    <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
    <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
    <link rel="stylesheet" href="{% static 'css/safety_empilhadeira_app/safety_gab_empilhadeira_app.css' %}" />
    <link rel="stylesheet" href="{% static 'libs/bootstrap_select_1_14_0/css/bootstrap-select.css' %}"/>

{% endblock %}

<div class="d-flex flex-column align-items-center justify-content-start text-white" style="margin-right: 0px;width:100%;height:100svh">
   <div class="d-flex align-items-end justify-content-between div_Titulo" style="padding-bottom:15px;width:100%;border-radius:0px;">
       <div class="d-flex justify-content-start align-items-center" style="width: 90%;">
            <i class="fa-solid fa-warehouse" style="font-size:30px; margin-left:0px; margin-right:15px; color:{{cor_empresa}};"></i>
           <h1 class="titlePadraoMenu" style="margin-left:0px;font-weight: 500;">Empilhadeira</h1>
       </div>
       <div class="d-flex flex-column justify-content-center align-items-end mb-1" style="width: 10%;">
           <i class="fa-solid fa-helmet-safety" style="font-size:30px;color:{{cor_empresa}};"></i>
       </div>
   </div>
    <div id="div_corpo_gab_empilhadeira_emp" class="containerApp w-100 h-100" style="min-height:fit-content;">
        <div class="form-group form_div_check w-100 h-100" >
            <div class="col-md-12 w-100 h-100">
                <form class="h-100" id="form_preenche_check" name="form_preenche_check">
                    <div class="tab-content h-100" style="border-radius:0 0 10px 10px; font-size:15px">
                        <div class="tab-pane active h-100" id="div_tab_new_check" role="tabpanel" aria-labelledby="a_tab_new_check">
                                <div class="h-100" style="text-align:left;flex-direction:column;justify-content:space-between;display:flex;">
                                    <div style="padding:15px;padding-right:30px;padding-left:30px">
                                        <div class="form-group">
                                            <label id="unidade_operador_label" for="unidade_check_emp"> Unidade </label>
                                            <select class="selectpicker form-control responsive-font" id="unidade_check_emp" name="unidade_check_emp" placeholder="Selecione a unidade" data-live-search="true">
                                                {% autoescape off %}
                                                    {{options_select}}
                                                {% endautoescape %}
                                            </select>
                                        </div>
                                        <div class="form-group">
                                           <label for="placa_empilhadeira_emp">Empilhadeira:</label>
                                           <select class="selectpicker form-control responsive-font" id="placa_empilhadeira_emp" name="placa_empilhadeira_emp" placeholder="Escolha a empilhadeira" disabled data-live-search="true">
                                           </select>
                                        </div>
                                    </div>
                                    <div style="justify-content:space-between;display:flex;padding-right:1rem;padding-left:2rem;margin-top:2rem;margin-bottom:2rem;height:3rem">
                                        <button type="button" class="btn-voltar-menu-safety" style="border-style:none;background-color:rgba(0,0,0,0);height:fit-content">
                                            <div style="display:flex;flex-direction:column">
                                                <i class="fa-solid fa-circle-arrow-left" style="color:{{cor_empresa}};font-size:32px"></i>
                                                <b style="color:white;font-size:12px">Voltar</b>
                                            </div>
                                        </button>
                                        <button class="create-check-equipamento-empilhadeira" type="button" style="border-style:none;background-color:rgba(0,0,0,0);height:fit-content">
                                            <div style="display:flex;flex-direction:column">
                                                <i class="fa-solid fa-circle-plus" style="font-size:32px; margin-left:0px;color:{{cor_empresa}};"></i>
                                                <b style="color:white;font-size:12px">Gerar check</b>
                                            </div>
                                        </button>
                                    </div>
                                </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
