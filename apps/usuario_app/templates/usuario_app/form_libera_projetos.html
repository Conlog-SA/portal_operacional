{% load static %}

{% block link_static_css %}
    <link rel="stylesheet" href="{% static 'css/usuario_app/liberacao_projetos.css' %}" />

{% endblock %}

<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-100">

    <div class="mt-3 d-flex align-items-center justify-content-between div_Titulo">
        <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-diagram-project" alt="Liberação de módulos"></i>
            <h1 class=" titlePadraoMenu">Liberação de Projetos</h1>
        </div>
        {% if obj_usuario_logado.cod_filial.cod_empresa.cod_empresa == 12 %}
            <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
        {% else %}
            <img class="logo_cabecalho" src="{% static 'icons/logo-small-deep.png' %}" >
        {% endif %}
    </div>
    <div class="d-flex justify-content-between align-items-between div_Titulo_line">
        <hr class="hr_title">
    </div>
	

	<div class="containerApp">
        <form id="frm_libera_proj" name="frm_libera_proj"  method="POST"
              class="d-flex flex-column align-items-center justify-content-between cl_frm_topo_paginas">
            {% csrf_token %}

            <div class="d-flex w-100 justify-content-between align-items-center">
                <div class="d-flex flex-column align-items-start w-100">
                    <label>Usuário</label>
                    <select name="cb_usuarios_frm_libera_proj" id="cb_usuarios_frm_libera_proj" data-live-search="true"
                            class="selectpicker form-control">
                        <option value="0" selected="selected">-- Selecione um usuário --</option>
                        {% for usu in lista_usuarios_ativos %}
                            <option value="{{ usu.cod_usu }}" >{{ usu.nome_usu }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-flex flex-column align-items-start w-100" style="margin-left: 0.25rem; margin-right: 0.25rem;">
                    <label>Empresa</label>
                    <select name="cb_emp_frm_libera_proj" id="cb_emp_frm_libera_proj" data-live-search="true"
                        class="selectpicker form-control" title="-- Selecione a empresa --">
                    {% for emp in lista_emp %}
                        <option value="{{ emp.cod_empresa }}" >{{ emp.desc_empresa }}</option>
                    {% endfor %}
                    </select>
                </div>
                <div class="d-flex justify-content-between align-items-end w-100"
                     style="margin-left: 0.25rem; margin-right: 0.25rem;">
                    <label for="chk_seleciona_filiais_frm_libera_proj">
                        Filiais
                        <input type="checkbox" class="checkbox" name="chk_seleciona_filiais_frm_libera_proj"
                            id="chk_seleciona_filiais_frm_libera_proj" title="Selecionar todas as filiais"/>
                    </label>

                    <select name="cb_filial_frm_libera_proj" id="cb_filial_frm_libera_proj"
                            data-live-search="true" class="selectpicker form-control"
                            multiple data-selected-text-format="count > 0"
                            title="-- Selecione a filial --" >
                    </select>
                </div>
                <div class="d-flex justify-content-between align-items-end w-100">
                    <label for="chk_seleciona_proj_frm_libera_proj">Projetos
                        <input type="checkbox" class="checkbox" name="chk_seleciona_proj_frm_libera_proj"
                        id="chk_seleciona_proj_frm_libera_proj" title="Selecionar todos os projetos"/>
                    </label>
                    <select name="cb_proj_frm_libera_proj" id="cb_proj_frm_libera_proj" data-live-search="true"
                            class="selectpicker form-control"
                            multiple data-selected-text-format="count > 0"
                            title="-- Selecione a empresa e filial --">
                    </select>
                </div>
            </div>

            <div class="d-flex w-100 justify-content-between align-items-center mt-3 mb-4">
                <div class="d-flex flex-column align-items-start w-100">

                </div>
                <div class="d-flex flex-column align-items-start w-100">

                </div>
                <div class="d-flex flex-column align-items-start w-100">
                    &nbsp;&nbsp;
                </div>
                <div class="d-flex flex-column align-items-end w-100">
                    <button type='button' class='btn btn-lg btn-primary btn-rounded botaoPrincipal'
                            id="btn_libera_projetos_usu_form_libera_projetos"
                            name="btn_libera_projetos_usu_form_libera_projetos" >
                        <i class="fa-solid fa-check" style="color: white;"></i>
                        Liberar Projetos
                    </button>
                </div>
            </div>
        </form>


        <div class="form-group cl_div_tabela_principal_pagina w-100" >
                <table id="tab_liberacoes_proj_usu"  class="display wrap w-100 cl_tab_principal_pagina">
                    <thead>
                        <tr>
                            <th scope="col" ></th>
                            <th scope="col" align="left" style="color: grey; width:30%;">Colobarador</th>
                            <th scope="col" align="left" style="color: grey; width:35%;">Projeto</th>
                            <th scope="col" align="left" style="color: grey">Perfil</th>
                            <th scope="col" align="left" style="color: grey">Corporativo?</th>
                            <th scope="col" align="center" style="color: grey">Liberado Até</th>
                            <th scope="col" align="center" style="color: grey">Bloqueia/Desbloqueia</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>

        </div>

    </div>
</div>
