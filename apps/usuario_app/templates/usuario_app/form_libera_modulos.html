{% load static %}

{% block link_static_css %}
  <link rel="stylesheet" href="{% static 'css/usuario_app/liberacao_modulos.css' %}" />
{% endblock %}


<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-100">
    <div class="mt-3 d-flex align-items-start justify-content-between div_Titulo">
        <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-user-gear fa-2xl" alt="Liberação de módulos"></i>
            <h1 class=" titlePadraoMenu">Liberação de Módulos</h1>
        </div>
        {% if obj_usuario_logado.cod_filial.cod_empresa.cod_empresa == 12 %}
            <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
        {% else %}
            <img class="logo_cabecalho" src="{% static 'icons/logo-small-deep.png' %}" >
        {% endif %}
    </div>
    <div class="d-flex justify-content-between align-items-between div_Titulo_line">
        <hr class="hr_title">
    </div>

	<div class="cl_div_tabela_principal_pagina" style="width: 95%">
		<form id="frm_cad_usu" name="frm_cad_usu"  method="POST"
			class="d-flex justify-content-center align-items-center containerApp flex-column homeApp__loginForm">
			{% csrf_token %}
			<div class="form__group field d-flex w-100 justify-content-center align-items-center">
				<select name="cb_usuarios" id="cb_usuarios" data-live-search="true"
					class="selectpicker form-control w-50" style="color: #999999; font-size: 20px; height: 54.65px">
				<option value="0" selected="selected">-- Selecione um usuário --</option>
				{% for usu in lista_usuarios_ativos %}
					<option value="{{ usu.cod_usu }}" >{{ usu.nome_usu }}</option>
				{% endfor %}
				</select>
				
				<button type='button' id="btn_abre_modal_replica_acessos" name="btn_abre_modal_replica_acessos" class="btn btn-primary btn-rounded liberaModulos__botao" >
					<i class="fa-solid fa-code-compare"></i>
					<span>Copiar acessos</span>
				</button>
			</div>
		</form>
		<div class="containerApp mt-5" id="div_modulos_usu">

		</div>
	</div>
</div>



{% include 'usuario_app/modais_form_libera_modulos.html' %}
