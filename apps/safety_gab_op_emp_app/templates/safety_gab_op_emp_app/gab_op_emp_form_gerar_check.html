{% load static %}

{% block link_static_css %}
    <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
    <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
    <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
    <link rel="stylesheet" href="{% static 'css/safety_gab_op_emp_app/safety_gab_op_emp_app.css' %}" />

{% endblock %}

<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-95" style="margin-right: 0px; width:100%;">
   <div class="mt-3 d-flex align-items-end justify-content-between div_Titulo" style="padding-bottom:15px;">
       <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-dolly" style="font-size:50px; margin-left:0px; margin-right:15px; color:#cf6a15;"></i>
           <h1 class="titlePadraoMenu" style="margin-left:0px;">Empilhadeiras</h1>
       </div>
       <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
   </div>
    <div id="div_corpo_gab_op_emp" class="containerApp w-95">
        <div class="form-group form_div_check w-100" >
            <div class="col-md-12 w-100 h-100">
                <form id="form_preenche_check" name="form_preenche_check" style="padding-left:1rem">
                    <div class="tab-content" style="border-radius:0 0 10px 10px; font-size:15px">
                        <div class="tab-pane active" id="div_tab_new_check" role="tabpanel" aria-labelledby="a_tab_new_check">
                                <div class="row" style="text-align:left;">
                                    <div style="padding:15px;padding-right:30px;padding-left:30px">
                                        <div class="form-group">
                                           <label for="unidade_operador"> Unidade </label>
                                           <input type="text" class="form-control responsive-font" id="unidade_operador" name="unidade_operador" disabled value="{{cod_filial_operador}}">
                                        </div>
                                        <div class="form-group">
                                           <label for="tipo_operador">Tipo de Operador</label>
                                           <select class="selectpicker form-control responsive-font" id="tipo_operador" name="tipo_operador">
                                               <option value="1">Colaborador</option>
                                               <option value="2">Terceiro</option>
                                           </select>
                                        </div>
                                        <div class="form-group">
                                           <label class="responsive-font" for="nome_operador">Operador:</label>
                                           <input type="text" class="form-control responsive-font" id="nome_operador" name="nome_operador" disabled value="{{cod_operador}}">
                                        </div>
                                        <div class="form-group">
                                           <label for="documento_operador">Documento (CPF):</label>
                                           <input type="text" class="form-control responsive-font" id="documento_operador" name="documento_operador">
                                        </div>
                                        <div class="form-group">
                                           <label for="modelo_empilhadeira">Modelo Empilhadeira</label>
                                           <select class="selectpicker form-control responsive-font" id="modelo_empilhadeira" name="modelo_empilhadeira" placeholder="Escolha o modelo" required>
                                               {% for modelo in lista_modelos_emp %}
                                                    <option value="{{modelo.cod_modelo_emp}}">{{modelo.desc_emp}}</option>
                                               {% endfor %}
                                           </select>
                                        </div>
                                        <div class="form-group">
                                           <label for="tipo_operacao">Tipo de Operação</label>
                                           <select class="selectpicker form-control responsive-font" id="tipo_operacao" name="tipo_operacao" placeholder="Escolha o modelo de empilhadeira" required>
                                           </select>
                                        </div>
                                    </div>
                                    <div style="justify-content:flex-end;display:flex;padding-right:4rem;margin-top:2rem;margin-bottom:2rem;height:3rem">
                                        <button class="create-check" type="button" style="padding;border-radius:3px">Gerar check</button>
                                    </div>
                                </div>
                        </div>
                </form>
            </div>
        </div>
    </div>
</div>
