{% load static %}

{% block link_static_css %}
    <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
    <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
    <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
    <link rel="stylesheet" href="{% static 'css/safety_gab_op_emp_app/safety_gab_op_emp_app.css' %}" />
    <link rel="stylesheet" href="{% static 'libs/bootstrap_select_1_14_0/css/bootstrap-select.css' %}"/>

{% endblock %}

<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white" style="margin-right: 0px; width:100%;">
   <div class="mt-3 d-flex align-items-end justify-content-between div_Titulo" style="padding-bottom:15px;">
       <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-dolly" style="font-size:50px; margin-left:0px; margin-right:15px; color:#cf6a15;"></i>
           <h1 class="titlePadraoMenu" style="margin-left:0px;">Empilhadeiras</h1>
       </div>
       <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
   </div>
    <div id="div_corpo_gab_op_emp" class="containerApp w-95 h-100 mb-3" style="border-radius:0rem 0rem 0.5rem 0.5rem">
        <div class="form-group form_div_check w-100 h-100" >
            <div class="col-md-12 w-100 h-100">
                <form class="h-100" id="form_preenche_check" name="form_preenche_check">
                    <div class="tab-content h-100" style="border-radius:0 0 10px 10px; font-size:15px">
                        <div class="tab-pane active h-100" id="div_tab_new_check" role="tabpanel" aria-labelledby="a_tab_new_check">
                                <div class="row h-100" style="text-align:left;flex-direction:column;justify-content:space-between;">
                                    <div style="padding:15px;padding-right:30px;padding-left:30px">
                                        <div class="form-group">
                                            <label id="unidade_operador_label" for="unidade_operador"> Unidade </label>
                                            <select class="selectpicker form-control responsive-font" id="unidade_operador" name="unidade_operador" placeholder="Selecione a unidade">
                                                {% autoescape off %}
                                                    {{options_select}}
                                                {% endautoescape %}
                                            </select>
                                        </div>
                                        <div class="form-group">
                                           <label for="tipo_operador">Tipo de Operador</label>
                                           <select class="selectpicker form-control responsive-font" id="tipo_operador" name="tipo_operador" placeholder="Selecione o tipo de operador">
                                               <option value="1">Colaborador</option>
                                               <option value="2">Terceiro</option>
                                           </select>
                                        </div>
                                        <div class="form-group">
                                           <div id="div_operador" class="form-group">
                                                <label class="responsive-font" for="nome_operador">Operador:</label>
                                                <select class="selectpicker form-control responsive-font" id="nome_operador" name="nome_operador" value="{{nome_operador}}" placeholder="Selecione o operador" disabled>
                                                </select>
                                           </div>
                                           <div id="div_operador_terceiro" class="form-group hidden-div">
                                                <label class="responsive-font" for="nome_operador">Operador:</label>
                                                <input type="text" class="form-control responsive-font" id="nome_operador_terceiro" name="nome_operador_terceiro">
                                           </div>
                                        </div>
                                        <div class="form-group">
                                            <label for="documento_operador">Documento (CPF):</label>
                                            <input type="text" class="form-control responsive-font" id="documento_operador" name="documento_operador" disabled>
                                        </div>
                                        <div class="form-group">
                                           <label for="modelo_empilhadeira">Modelo Empilhadeira</label>
                                           <select class="selectpicker form-control responsive-font" id="modelo_empilhadeira" name="modelo_empilhadeira" placeholder="Escolha o modelo" required>
                                               {% for modelo in lista_modelos_emp %}
                                                    <option value="{{modelo.cod_modelo_emp}}">{{modelo.desc_emp}}</option>
                                               {% endfor %}
                                           </select>
                                        </div>
                                        <div class="form-group">
                                           <label for="tipo_operacao">Tipo de Operação</label>
                                           <select class="selectpicker form-control responsive-font" id="tipo_operacao" name="tipo_operacao" placeholder="Escolha o modelo de empilhadeira" required>
                                           </select>
                                        </div>
                                    </div>
                                    <div style="justify-content:space-between;display:flex;padding-right:2rem;padding-left:2rem;margin-top:2rem;margin-bottom:2rem;height:3rem">
                                        <button type="button" class="btn-voltar-menu-safety" style="border-style:none;background-color:rgba(0,0,0,0);height:fit-content">
                                            <div style="display:flex;flex-direction:column">
                                                <i class="fa-solid fa-arrow-left" style="color:#f46424;font-size:32px"></i>
                                                <b style="color:white;font-size:17px">Voltar</b>
                                            </div>
                                        </button>
                                        <button class="create-check" type="button" style="border-style:none;background-color:rgba(0,0,0,0);height:fit-content">
                                            <div style="display:flex;flex-direction:column">
                                                <i class="fa-solid fa-circle-plus" style="font-size:32px; margin-left:0px;color:#f46424;"></i>
                                                <b style="color:white;font-size:17px">Gerar check</b>
                                            </div>
                                        </button>
                                    </div>
                                </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
