{% load static %}

{% block link_static_css %}
    <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
    <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
    <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
    <link rel="stylesheet" href="{% static 'css/safety_gab_op_emp_app/safety_gab_op_emp_app.css' %}" />

{% endblock %}

<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-95" style="margin-right: 0px; width:100%;">
   <div class="mt-3 d-flex align-items-end justify-content-between div_Titulo" style="padding-bottom:15px;">
       <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-truck-fast" style="font-size:50px; margin-left:0px; margin-right:15px; color:#cf6a15;"></i>
           <h1 class="titlePadraoMenu" style="margin-left:0px;">Safety</h1>
       </div>
       <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
   </div>
    <div class="containerApp w-95">
        <div class="form-group form_div_check w-100" >
            <div class="col-md-12 w-100 h-100">
                <form id="form_new_check_list" name="form_nem_check_list" style="padding-left:1rem">
                    <div style="display:flex;justify-content:right;margin-right:1rem;margin-bottom:0.5rem;margin-top:0.25rem">
                        <div style="width:30rem">
                            <select class="selectpicker form-control" data-live-search="true" name="modelos_existentes"
                                    id="modelos_existentes" name="modelos_existentes" title="Selecione um check existente" required>
                                {% for ch in lista_checks %}
                                    <option value="{{ch.cod_check}}">{{ch.desc_check}}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <nav>
                        <div class="nav nav-tabs" id="myTab" role="tablist">
                          <button class="nav-link active tabs-nav" id="a_tab_new_check" data-bs-toggle="tab"
                             data-bs-target="#div_tab_new_check"  type="button" role="tab"
                             aria-controls="div_tab_new_check"
                             aria-selected="true" style="border-radius:0px 0px 0 0; font-size:15px">
                             Novo Check List
                             <i class="fa-solid fa-filter" style="color: #f46424;"></i>
                          </button>
                          <button class="nav-link tabs-nav" id="a_tab_check_criados" data-bs-toggle="tab"
                             data-bs-target="#div_check_criados" type="button" role="tab"
                             aria-controls="div_check_criados"
                             aria-selected="false" style="border-radius:0px 0px 0 0; font-size:15px" >
                             Check Aplicados
                            <i class="fa-solid fa-pen-to-square" style="color: #f46424"></i>
                          </button>
                        </div>
                    </nav>
                    <div class="tab-content" style="border-radius:0 0 10px 10px; font-size:15px">
                        <div class="tab-pane active" id="div_tab_new_check" role="tabpanel" aria-labelledby="a_tab_new_check" style="padding-left:5px;">
                                <div class="row" style="text-align:left;">
                                    <div class="row" style="padding:15px">
                                        <div class="form-group col-sm-12">
                                           <label for="descricao_new_check"> Descrição </label>
                                           <input type="text" class="form-control" id="descricao_new_check">
                                        </div>
                                        <div class="form-group col-sm-3">
                                           <label for="versao_new_check">Versão</label>
                                           <input type="text" class="form-control" id="versao_new_check">
                                        </div>
                                        <div class="form-group col-sm-3">
                                           <label for="desativar_new_check_date">Desativar em:</label>
                                           <input type="date" class="form-control" id="desativar_new_check_date">
                                        </div>
                                        <div class="form-group col-sm-3">
                                           <label for="medida_periodicidade_new_check">Medida Periodicidade</label>
                                           <select class="selectpicker form-control" id="medida_periodicidade_new_check" name="medida_periodicidade_new_check" placeholder="Diário, Semanal, Mensal etc." required>
                                               <option value="1">Dia(s)</option>
                                               <option value="2">Semana(s)</option>
                                               <option value="3">Mês(es)</option>
                                           </select>
                                        </div>
                                        <div class="form-group col-sm-3">
                                          <label for="periodicidade_new_check">Periodicidade</label>
                                          <input type="text" class="form-control" id="periodicidade_new_check">
                                        </div>
                                        <div class="form-group col-sm-12 w-15 d-flex justify-content-end" style="margin-top:10px">
                                            <button type="button" class="btn btn-primary btn-form" id="btn_reset_check"
                                             name="btn_reset_check" style="margin-top:10px" hidden>
                                             <i class="fa-solid fa-arrow-left"></i>
                                              Voltar </button>
                                            <button type="button" class="btn btn-primary btn-form btn-cadastro" id="btn_new_check"
                                             name="btn_new_check" style="margin-top:10px; margin-left:10px">
                                             <i class="fa-solid fa-folder-plus"></i>
                                              Criar Check </button>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="d-flex justify-content-between align-items-between mt-3 w-100">
                                            <i class="fa-solid fa-code-compare" style="color:#ef7814;"></i>Vincular filiais
                                        </div>
                                        <div class="d-flex justify-content-between align-items-between w-100">
                                            <hr class="hr_title">
                                        </div>
                                        <div class="form-group col-sm-12 d-flex align-items-start" style="margin-bottom:0px;">
                                            <label>Liberado para as filiais:</label>
                                        </div>
                                        <div class="form-group col-sm-12">
                                            <select class="selectpicker form-control" data-live-search="true" multiple
                                            id="liberado_filiais" name="liberado_filiais" placeholder="Liberado Filiais" required>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="d-flex justify-content-between align-items-between mt-3 w-100">
                                            <i class="fa-solid fa-bars" style="color:#ef7814;"></i>Itens Check
                                        </div>
                                        <div class="d-flex justify-content-between align-items-between w-100">
                                            <hr class="hr_title">
                                        </div>
                                        <div class="form-group col-sm-12">
                                            <label for="descricao_item_check"> Descrição do Item</label>
                                            <input type="text" class="form-control" id="descricao_item_check" disabled>
                                        </div>
                                        <div class="form-group col-sm-4">
                                            <label for="select_tipo_item">Tipo de Item</label>
                                            <select class="selectpicker form-control"
                                               id="select_tipo_item" name="select_tipo_item" placeholder="Tipo de Item" disabled>
                                                <option value="1">Item</option>
                                                <option value="2">Agrupador</option>
                                            </select>
                                        </div>
                                        <div class="form-group col-sm-4">
                                            <label for="select_tipo_resposta">Tipo De Resposta</label>
                                            <select class="selectpicker form-control"
                                            id="select_tipo_resposta" name="select_tipo_resposta"
                                            placeholder="Tipo de Resposta" disabled>
                                               <option value="1">OK</option>
                                               <option value="2">Não OK</option>
                                            </select>
                                        </div>
                                        <div class="form-group col-sm-4">
                                            <label for="input_ordem_check">Ordem</label>
                                            <input type="text" class="form-control" id="input_ordem_check" disabled>
                                        </div>
                                        <div class="form-group col-sm-4">
                                            <label for="desativar_item_date">Desativar em:</label>
                                            <input type="date" class="form-control" id="desativar_item_date" disabled>
                                        </div>
                                        <div class="form-group col-sm-2 check-box">
                                            <div class="label">
                                                <label for="obs_imagem_check_box"> Campo Imagem e OBS</label>
                                            </div>
                                            <div class="container">
                                                <input type="checkbox" class="checkbox" role="switch" name="obs_imagem_check_box" id="obs_imagem_check_box" disabled>
                                            </div>
                                        </div>
                                        <div class="form-group col-sm-12 w-15 d-flex justify-content-end" style="margin-top:10px; margin-botton:10px;">
                                            <button type="button" class="btn btn-primary btn-form" id="btn_reset_item"
                                             name="btn_reset_item" style="margin-top:10px;margin-bottom:10px" hidden>
                                             <i class="fa-solid fa-arrow-left"></i>
                                              Voltar </button>
                                            <button type="button" class="btn btn-primary btn-form btn-cadastro" id="btn_new_item"
                                                    name="btn_new_item" style="margin-bottom: 10px;margin-top: 10px;margin-left:10px">
                                                <i class="fa-solid fa-file-circle-plus"></i>
                                                Adicionar item
                                            </button>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-between mt-3 w-100">
                                            <i class="fa-solid fa-file-circle-plus" style="color:#ef7814;"></i>Itens Adicionados
                                        </div>
                                        <div class="d-flex justify-content-between align-items-between w-100">
                                            <hr class="hr_title">
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <ul id="sortable" class="sortable">
                                    </ul>
                                </div>
                        </div>
                        <div class="tab-pane" id="div_check_criados" role="tabpanel" aria-labelledby="a_tab_check_criados">
                           <form id="form_check_aplicados" name="form_check_aplicados" method="POST" style="margin-left:10px; margin-right:10px;">
                              <div class="row">
                                  <div class="col md-5">
                                      <label for="filial_check_aplicado">Filial</label>
                                      <select class="selectpicker form-control" id="filial_check_aplicado" name="filial_check_aplicado">
                                      </select>
                                  </div>
                              </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
