{% load static %}


<!-- Modal Confirma Armazenamento Compras Itens -->
<div id="modalConfirmaArmazenamentoComprasEditadasBenner" role="dialog" class="modal">
  <div class="modal-dialog" style="border-radius: 10px;">
    <div class="modal-content">
      <div class="modal-header"
           style="background-color:#f26522;height: 40px;padding-right: 5px;padding-bottom: 20px;
           padding-top: 20px;font-size:10px;">
        <div class="row"
             style="margin-left: 0px;margin-right: 0px;margin-bottom: 0px;width: 350px;height: 30px;"  >
          <div class="col-md-6" align="left">
            <p>
              <i class="fa-solid fa-filter fa-2xl" style="color: #FFFFFF;"></i>
              <span style="color:#ffffff; font-size:12px">Edição de Registros</span>
            </p>
          </div>
          <div class="col-md-6" align="right">
            <button type="button" name="btnFechaModalConfirmaArmazenamentoComprasEditadasBenner"
                    id="btnFechaModalConfirmaArmazenamentoComprasEditadasBenner"
                    data-dismiss="modal" aria-hidden="true" class="btn btn-sm btn-rounded">
                <i class="fa-solid fa-circle-xmark fa-2xl" style="color: #FFFFFF;"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="modal-body">
        <div class="text-center">
          <p style="color: #000000;">Tem certeza que deseja alterar os dados ?</p>
          <br/>
          <button type="button" name="btn_salva_compras_itens" id="btn_salva_compras_itens"
                  class="btn btn-primary btn-rounded botaoPrincipal">
            <i class="fa-solid fa-check"></i>
            Confirmar Alteração
        </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal justificativa itens compras -->
<div id="modal_justificativas_itens_compras_sup_evolucao_precos" role="dialog" class="modal">
  <div class="modal-dialog" style="border-radius: 10px;">
    <div class="modal-content">
      <div class="modal-header"  style="background-color:#f26522;height: 40px;padding-right: 5px;padding-bottom: 35px;
            padding-top: 10px;font-size:10px;">
          <div class="row" style="margin-left: 0px;margin-right: 0px;width: 1320px;margin-top: 35px;" >
              <div class="col-md-6" align="left">
                  <p>
                      <i class="fa-solid fa-comment-dots fa-2xl" style="color: #FFFFFF;"></i>
                      <span style="color:#ffffff; font-size:15px">Justificar Item</span>
                  </p>
              </div>
              <div class="col-md-6" align="right">
                  <button type="button" name="btn_fecha_modal_justificativas_itens_compras_sup_evolucao_precos"
                          id="btn_fecha_modal_justificativas_itens_compras_sup_evolucao_precos"
                          class="btn btn-sm btn-rounded btn_fecha_modal">
                    <i class="fa-solid fa-circle-xmark fa-2xl" style="color: #FFFFFF;"></i>
                  </button>
                  </div>
          </div>
      </div>
      <div class="modal-body">
          <div class="mt-3 d-flex justify-content-between align-items-between w-100" >
              <div class="d-flex flex-column w-100">
                  <textarea class="form-control" id="ta_justificativa_item_compra"
                            name="ta_justificativa_item_compra"
                            autocomplete="off" placeholder="Justificativa" rows="5" cols="33"
                            style="padding-left: 5px;padding-right: 5px;height: 108px;width: 100%;"></textarea>
              </div>
          </div>

          <div class="mt-3 d-flex justify-content-between align-items-start w-100 mb-2" >
              <div class="d-flex flex-column w-100">
              </div>
              <div class="d-flex flex-column w-100">
                  <button type="button" name="btn_confirma_just_item_compra"
                          id="btn_confirma_just_item_compra"
                          class="btn btn-primary btn-rounded botaoPrincipal">
                    <i class="fa-solid fa-check" style="color: #2E8B57;"></i>
                      Justificar
                  </button>
              </div>
          </div>

      </div>
    </div>
  </div>
</div>
