{% load static %}
{% load plotly_dash %}

{% block link_static_css %}
 <link rel="stylesheet" href="{% static 'css/suprimentos_evolucao_precos_app/dash_evolucao_precos.css' %}" />

{% endblock %}


<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-100">
    <div class="mt-3 d-flex align-items-start justify-content-between div_Titulo">
        <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-arrow-up-right-dots"style="color: #f46424;"></i>
            <h1 class=" titlePadraoMenu">Dash evolução de preços</h1>
        </div>
        {% if obj_usuario_logado.cod_filial.cod_empresa.cod_empresa == 12 %}
            <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
        {% else %}
            <img class="logo_cabecalho" src="{% static 'icons/logo-small-deep.png' %}" >
        {% endif %}
    </div>

    <div class="containerApp">
        <form id="form_dash_evolucao_precos" name="form_dash_evolucao_precos"
              method="POST"
              class="d-flex flex-column align-items-center justify-content-between cl_frm_topo_paginas">
            {% csrf_token %}

            <div class="d-flex justify-content-between align-items-between w-100">
                <hr class="hr_title">
            </div>

            <div class="d-flex justify-content-between align-items-between w-100">
                <div class="d-flex flex-column justify-content-end align-items-start w-100">
                    <label for="cb_empresas_dash_evolucao_precos">
                        Empresa
                    </label>
                    <select class="selectpicker form-control" id="cb_empresas_dash_evolucao_precos"
                        name="cb_empresas_dash_evolucao_precos"
                        data-live-search="true"
                        title="Selecione a empresa">
                        <option value="12"
                                {% if cod_empresa == 12 %}
                                    selected="selected"
                                {% endif %}>
                            Concórdia Logística S.A.
                        </option>
                        <option value="17"
                                {% if cod_empresa == 17 %}
                                    selected="selected"
                                {% endif %}>
                            Deep</option>
                    </select>

                </div>

                <div class="d-flex flex-column justify-content-end align-items-start w-100" style="padding-left: 0.25rem;">
                    <label for="cb_filial_dash_evolucao_precos">
                        Unidade
                        <button type='button' id="btn_marcar_unidade_dash_evolucao_precos"
                                name="btn_marcar_unidade_dash_evolucao_precos"
                                class="btn btn-rounded btn-space"
                                title="Selecionar todos os projetos"
                                style="width: 50px;">
                            <i class="fa-regular fa-square-check" style="color: #f46424;"></i>
                        </button>
                        <button type='button' id="btn_desmarcar_unidade_dash_evolucao_precos"
                                name="btn_desmarcar_unidade_dash_evolucao_precos"
                                class="btn btn-rounded btn-space"
                                title="Limpar seleção"
                                style="width: 50px;">
                            <i class="fa-regular fa-square" style="color: #f46424;"></i>
                        </button>
                    </label>
                    <select class="selectpicker form-control" id="cb_filial_dash_evolucao_precos"
                        name="cb_filial_dash_evolucao_precos" multiple data-selected-text-format="count > 1"
                        data-live-search="true"
                        title="Selecione a filial">
                        {% for f in lista_filiais %}
                            <option value="{{ f.HANDLE }}" selected="selected">{{ f.NOME }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="d-flex flex-column justify-content-end align-items-start w-100" style="padding-left: 0.25rem;">
                    <label for="cb_atendente_dash_evolucao_precos">
                        Atendente
                        <button type='button' id="btn_marcar_atendente_dash_evolucao_precos"
                                name="btn_marcar_atendente_dash_evolucao_precos"
                                class="btn btn-rounded btn-space"
                                title="Selecionar todos os projetos"
                                style="width: 50px;">
                            <i class="fa-regular fa-square-check" style="color: #f46424;"></i>
                        </button>
                        <button type='button' id="btn_desmarcar_atendente_dash_evolucao_precos"
                                name="btn_desmarcar_atendente_dash_evolucao_precos"
                                class="btn btn-rounded btn-space"
                                title="Limpar seleção"
                                style="width: 50px;">
                            <i class="fa-regular fa-square" style="color: #f46424;"></i>
                        </button>
                    </label>
                    <select class="selectpicker form-control" id="cb_atendente_dash_evolucao_precos"
                        name="cb_atendente_dash_evolucao_precos"
                        data-live-search="true" multiple data-selected-text-format="count > 1"
                        title="Selecione a filial">
                        {% for a in lista_atendentes %}
                            <option value="{{ a.handle_usu }}" selected="selected">{{ a.nome_usu }}</option>
                        {% endfor %}
                    </select>

                </div>

                <div class="d-flex flex-column justify-content-end align-items-start w-100" style="padding-left: 0.25rem;">
                     <label for="cb_familia_dash_evolucao_precos">
                        Famílias
                        <button type='button' id="btn_marcar_familia_dash_evolucao_precos"
                                name="btn_marcar_familia_dash_evolucao_precos"
                                class="btn btn-rounded btn-space"
                                title="Selecionar todos os projetos"
                                style="width: 50px;">
                            <i class="fa-regular fa-square-check" style="color: #f46424;"></i>
                        </button>
                        <button type='button' id="btn_desmarcar_familia_dash_evolucao_precos"
                                name="btn_desmarcar_familia_dash_evolucao_precos"
                                class="btn btn-rounded btn-space"
                                title="Limpar seleção"
                                style="width: 50px;">
                            <i class="fa-regular fa-square" style="color: #f46424;"></i>
                        </button>
                    </label>

                    <select class="selectpicker form-control" id="cb_familia_dash_evolucao_precos"
                        name="cb_familia_dash_evolucao_precos"
                        data-live-search="true" multiple data-selected-text-format="count > 1">
                        {% for familia in lista_familias %}
                            <option value="{{ familia.handle }}" selected="selected">{{ familia.nome }}</option>
                        {% endfor %}
                    </select>
                </div>


            </div>

            <div class="d-flex justify-content-between align-items-between w-100">
                <div class="d-flex flex-column justify-content-center alin-items-start w-100">
                     <div class="loader" id="loader_dash_evolucao_preco">
                        <div class="loader-inner">
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                        </div>
                    </div>
                </div>

                <div class="d-flex flex-column justify-content-center align-items-start w-100" style="padding-left: 0.25rem;">
                    <label for="txt_data_ini_dash_evolucao_precos">
                        Data Inícial
                    </label>
                    <input type="date" class="form-control" id="txt_data_ini_dash_evolucao_precos"
                           value="{{ data_ini }}">
                </div>

                <div class="d-flex flex-column justify-content-center align-items-start w-100" style="padding-left: 0.25rem;">
                    <label for="txt_data_fim_dash_evolucao_precos">
                        Data Final
                        </label>
                        <input type="date" class="form-control" id="txt_data_fim_dash_evolucao_precos"
                               value="{{ data_fim }}">

                </div>


                <div class="d-flex flex-column justify-content-end align-items-end w-100">
                    <button type="button" name="btn_gera_dash_evolucao_precos"
                            id="btn_gera_dash_evolucao_precos"
                            class="btn btn-primary btn-rounded botaoPrincipal">
                        <i class="fa-solid fa-filter"></i>
                        Gerar Dados
                    </button>
                </div>
            </div>



        </form>

        <div class="form-group  cl_div_tabela_principal_pagina w-100">

            <div class="d-flex justify-content-between align-items-between w-100 mb-2">
                <div id="div_grafico_status_resumo" class="d-flex flex-column w-100" style="padding-right: 0.3rem;">
                </div>

                <div id="div_grafico_status_atendente" class="d-flex flex-column w-100" style="padding-left: 0.3rem;">
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-between w-100 mb-2">
                <div id="div_grafico_status_familia" class="d-flex flex-column w-100" style="padding-right: 0.25rem;">
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-between w-100 mb-2">
                <div id="div_grafico_status_filial" class="d-flex flex-column w-100" style="padding-right: 0.25rem;">
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-between w-100 mb-2">
                <div id="div_grafico_qtd_itens_filial" class="d-flex flex-column w-100" style="padding-right: 0.25rem;">
                </div>
            </div>


        </div>





    </div>
</div>
