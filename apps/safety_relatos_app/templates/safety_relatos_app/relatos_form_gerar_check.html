{% load static %}

{% block link_static_css %}
    <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
    <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
    <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
    <link rel="stylesheet" href="{% static 'css/safety_relatos_app/safety_relatos_app.css' %}" />

{% endblock %}

<div class="d-flex flex-column align-items-center justify-content-start text-white w-95" style="margin-right:0px;width:100%;height:100svh">
   <div class="mt-3 d-flex align-items-end justify-content-between div_Titulo" style="padding-bottom:15px;">
       <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-file-signature" style="font-size:50px; margin-left:0px; margin-right:15px; color:#cf6a15;"></i>
           <h1 class="titlePadraoMenu" style="margin-left:0px;">Relatos</h1>
       </div>
       <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
   </div>
    <div id="div_corpo_relatos" class="containerApp w-95 h-100" style="border-radius:0rem 0rem 0.5rem 0.5rem;margin-bottom:1rem">
        <div class="form-group form_div_check w-100 h-100" >
            <div class="col-md-12 w-100 h-100">
                <form class="h-100" id="form_preenche_check" name="form_preenche_check" style="padding-left:1rem">
                    <div class="tab-content h-100" style="border-radius:0 0 10px 10px; font-size:15px">
                        <div class="tab-pane active h-100" id="div_tab_new_check" role="tabpanel" aria-labelledby="a_tab_new_check">
                                <div class="row h-100" style="text-align:left;flex-direction:column;justify-content:space-between;">
                                    <div style="padding:15px;padding-right:30px;padding-left:30px">
                                        <div class="form-group">
                                           <label for="unidade"> Unidade: </label>
                                            <select class="selectpicker form-control responsive-font" id="unidade" name="unidade" placeholder="Selecione a unidade" data-live-search="true">
                                                {% autoescape off %}
                                                    {{options_select_unidade}}
                                                {% endautoescape %}
                                            </select>
                                        </div>
                                        <div class="form-group">
                                           <label for="tipo_relato">Tipo de Relato:</label>
                                           <select class="selectpicker form-control responsive-font" id="tipo_relato" name="tipo_relato" placeholder="Escolha o tipo">
                                               <option value="1">Ato inseguro</option>
                                               <option value="2">Condição insegura</option>
                                               <option value="3">Abordagem positiva</option>
                                           </select>
                                        </div>
                                        <div id="div_ato_inseguro_categorias" class="form-group hidden-div">
                                            <label class="responsive-font" for="nome_relatado_terceiro">Selecione o tipo de ato inseguro ocorrido, caso não identificado, selecione OUTROS</label>
                                            <select class="selectpicker form-control" id="ato_inseguro_categoria" name="ato_inseguro_categoria" placeholder="Escolha a categoria" data-live-search="true">
                                                {% for categoria in lista_categorias_ato_inseguro %}
                                                    <option value="{{categoria.cod_componente}}">{{categoria.desc_componente}}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        <div id="div_condicao_insegura_categorias" class="form-group hidden-div">
                                            <label class="responsive-font" for="nome_relatado_terceiro">Qual tipo de condição insegura ocorreu?</label>
                                            <select class="selectpicker form-control responsive-font" id="condicao_insegura_categoria" name="condicao_insegura_categoria" placeholder="Escolha a categoria" data-live-search="true">
                                                {% for categoria in lista_categorias_condicao_insegura %}
                                                    <option value="{{categoria.cod_componente}}">{{categoria.desc_componente}}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        <div id="div_comportamento_seguro_categorias" class="form-group hidden-div">
                                            <label class="responsive-font" for="nome_relatado_terceiro">Qual tipo de comportamento seguro ocorreu?</label>
                                            <select class="selectpicker form-control responsive-font" id="comportamento_seguro_categoria" name="comportamento_seguro_categoria" placeholder="Escolha a categoria" data-live-search="true">
                                                {% for categoria in lista_categorias_comportamento_seguro %}
                                                    <option value="{{categoria.cod_componente}}">{{categoria.desc_componente}}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        <div id="div_situacao_relatado" class="form-group">
                                           <label class="responsive-font" for="situacao_envolvido">Quem foi que gerou esta condição?</label>
                                           <select class="selectpicker form-control responsive-font" id="situacao_envolvido" name="situacao_envolvido" placeholder="Escolha a situação">
                                               <option value="1">Funcionario Conlog/Deep</option>
                                               <option value="2">Funcionario Ambev</option>
                                               <option value="3">Freteiro</option>
                                               <option value="4">Terceiros</option>
                                           </select>
                                        </div>
                                        <div id="div_relatado" class="form-group">
                                            <label class="responsive-font" for="nome_relatado">Nome do relatado:</label>
                                            <select class="selectpicker form-control responsive-font" id="nome_relatado" name="nome_relatado" value="{{nome_operador}}" placeholder="Selecione o operador" data-live-search="true" disabled>
                                            </select>
                                        </div>
                                        <div id="div_relatado_terceiro" class="form-group hidden-div">
                                            <label class="responsive-font" for="nome_relatado_terceiro">Nome do relatado:</label>
                                            <input type="text" class="form-control responsive-font" id="nome_relatado_terceiro" name="nome_relatado_terceiro">
                                        </div>
                                        <div class="form-group">
                                           <label for="local_relato">Local do relato:</label>
                                           <input type="text" class="form-control responsive-font" id="local_relato" name="local_relato">
                                        </div>
                                        <div class="form-group">
                                            <label for="processo_relato">O ato ocorreu durante um processo? qual processo?</label>
                                            <select class="form-control responsive-font selectpicker" id="processo_relato" name="processo_relato" placeholder="Selecione o processo" data-live-search="true">
                                                {% autoescape off %}
                                                    {{options_select_processo}}
                                                {% endautoescape %}
                                            </select>
                                        </div>
                                        <div id="div_atividade" class="form-group hidden-div">
                                           <label for="atividade_relato">Que atividade estava sendo realizada?</label>
                                            <select class="form-control responsive-font selectpicker" id="atividade_relato" name="atividade_relato" placeholder="Selecione a atividade" disabled data-live-search="true">
                                            </select>
                                        </div>
                                    </div>
                                    <div class="w-100" style="justify-content:space-between;display:flex;padding-right:2rem;padding-left:2rem;margin-top:2rem;margin-bottom:2rem;height:3rem">
                                        <button type="button" class="btn-voltar-menu-safety" style="border-style:none;background-color:rgba(0,0,0,0);height:fit-content">
                                            <div style="display:flex;flex-direction:column">
                                                <i class="fa-solid fa-arrow-left" style="color:#f46424;font-size:32px"></i>
                                                <b style="color:white;font-size:17px">Voltar</b>
                                            </div>
                                        </button>
                                        <button class="create-check-relatos" type="button" style="border-style:none;background-color:rgba(0,0,0,0);height:fit-content">
                                            <div style="display:flex;flex-direction:column">
                                                <i class="fa-solid fa-circle-plus" style="font-size:32px; margin-left:0px;color:#f46424;"></i>
                                                <b style="color:white;font-size:17px">Gerar check</b>
                                            </div>
                                        </button>
                                    </div>
                                </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    var flag_deep = null;
    if ("{{flag_deep}}" == "False") {
        console.log('sim');
        flag_deep = false;
    }
    else if ("{{flag_deep}}" == "True") {
        console.log('sim');
        flag_deep = true;
    }

</script>
