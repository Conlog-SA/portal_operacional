{% load static %}

{% block link_static_css %}
  <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
  <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
  <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
{% endblock %}



<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-100">
    <div class="mt-3 d-flex align-items-start justify-content-between div_Titulo">
        <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-clock-rotate-left fa-2xl" alt="Gera TMA TI" style="color: #f46424;"></i>
            <h1 class=" titlePadraoMenu">Gera TMA chamados</h1>
        </div>
        <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
    </div>

    <div class="containerApp">
        <form id="frm_gera_tma_ti" name="frm_gera_tma_ti"
              method="POST"
              class="d-flex flex-column align-items-center justify-content-between cl_frm_topo_paginas">
            {% csrf_token %}

            <div class="d-flex justify-content-between align-items-between w-100">
                <hr class="hr_title">
            </div>

            <div class="d-flex justify-content-between align-items-between w-100 mb-3">
                <div class="d-flex flex-column w-100" style="padding-right: 0.25rem;">
                    <label>
                        Data inícial
                        <input type="date" class="form-control" name="dt_gera_tma_ti_ini"
                           id="dt_gera_tma_ti_ini" autocomplete="off"/>
                    </label>
                </div>

                <div class="d-flex flex-column w-100" style="padding-left: 0.25rem; padding-right: 0.25rem;">
                    <label>
                        Data final
                        <input type="date" class="form-control" name="dt_gera_tma_ti_fim"
                           id="dt_gera_tma_ti_fim" autocomplete="off"/>
                    </label>

                </div>

                <div class="d-flex flex-column w-100" style="padding-left: 0.25rem; padding-top: 1.6rem;">
                    <button type="button" name="btn_pesq_tma_ti" id="btn_pesq_tma_ti"
                            class="btn btn-primary btn-rounded botaoPrincipal">
                        <i class="fa-solid fa-bolt"></i>
                        Gerar
                    </button>

                </div>
            </div>


            <div class="d-flex justify-content-between align-items-between w-100 mb-2" >
                <div class="d-flex align-items-end w-100 cl_div_loader_gera_tma_ti">
                    <div class="loader" id="loader_tma_ti">
                        <div class="loader-inner">
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex flex-column w-100">
                    &nbsp;&nbsp;
                </div>
            </div>
        </form>
        <!-- cl_div_tab_mapas_terceitos_2art -->
        <div class="form-group  cl_div_tabela_principal_pagina w-100">
                <table id="tab_frm_gera_tma_ti"  class="display wrap w-100">
                    <thead>
                        <tr>
                            <th scope="col"></th>
                            <th scope="col">Chamado</th>
                            <th scope="col">Usuário</th>
                            <th scope="col">Tópico</th>
                            <th scope="col">Subtópico</th>
                            <th scope="col">Aberto em:</th>
                            <th scope="col">Fechado em:</th>
                            <th scope="col">Horas atendimento</th>
                            <th scope="col">SLA</th>
                            <th scope="col">Data SLA</th>
                            <th scope="col">Atendente</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>

                </table>


        </div>
    </div>
</div>


{% include 'frota_disponibilidade_empilhadeira_app/modais_disponibilidade_empilhadeira.html' %}

<script
    src="{% static 'controllers/suprimentos_tma_app/form_requisicoes_gera_tma_controller.js' %}">
</script>
