{% load static %}

{% block link_static_css %}
     <!-- Bootstrap CSS first -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Gritter CSS -->
    <link rel="stylesheet" href="{% static 'libs/jquery_gritter_notifications_1_7_4/css/jquery_gritter.css' %}">
    <!-- Then your custom CSS -->
    <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
    <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
    <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
    <link rel="stylesheet" href="{% static 'css/nps_ti_app/nps_ti.css' %}" />
    <!-- Bootstrap-select CSS after Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'libs/bootstrap_select_1_14_0/css/bootstrap-select.css' %}"/>

    <!-- JavaScript dependencies in correct order -->
    <!-- jQuery first -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <!-- Popper.js before Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <!-- Bootstrap JS before bootstrap-select -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>
    <!-- Gritter after jQuery -->
    <script src="{% static 'libs/jquery_gritter_notifications_1_7_4/js/jquery_gritter.js' %}"></script>
    <!-- DataTables after jQuery -->
    <script src="https://cdn.datatables.net/1.10.7/js/jquery.dataTables.min.js"></script>
    <!-- Bootstrap-select JS last -->
    <script src="{% static 'libs/bootstrap_select_1_14_0/js/bootstrap-select.js' %}"></script>
    <!-- Your custom JS -->
    <script src="{% static 'controllers/nps_ti_app/nps_ti_app_controller.js' %}" type="text/javascript"></script>


{% endblock %}
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NPS | TI 2024</title>
    <style>
        body {
            font-family: Arial, sans-serif;

            margin: 1rem auto;
            padding: 1rem;
        }

        @media (max-width: 479px) {
            body {
                font-size:36px;
                max-width:95vw;
            }

            input[type="radio"] {
                width:40px;
                height:40px;
            }

            option {
                font-size: 14px;
            }

            textarea {
                height: 10rem;
            }

            .envio-nps {
                padding: 18px 60px;
            }
        }

        @media (min-width: 480px) {
            body {
                font-size: 14px;
                max-width:70vw;
            }

            input[type="radio"] {
                width:1rem;
                height:1rem;
            }

            .envio-nps {
                padding: 8px 16px;
            }
        }

        .form-header {
            {% if flag_empresa == 0 %}
                background-color: #f46424;
            {% elif flag_empresa == 1 %}
                background-color: #3b8eed;
            {% endif %}
            color: white;
            padding: 15px;
            border-radius: 8px 8px 0 0;
            font-family: serif;
        }
        .form-content {
            border: 1px solid #ddd;
            border-radius: 0 0 8px 8px;
            padding: 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        .required {
            color: red;
        }
        .email-section {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #666;
            margin-bottom: 0.75rem;
        }
        .radio-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.75rem;
            margin-bottom:1.5rem;
        }
        .radio-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }
        textarea {
            width: 100%;
            min-height: 5rem;
            margin-top: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 0.2rem;
            padding: 0.4rem;
        }
        .points {
            color: #666;
            float: right;
            font-size: 0.9em;
        }
        .gritter-top{
            {% if flag_empresa == 0 %}
                background: #f46424;
            {% elif flag_empresa == 1 %}
                background: #3b8eed;
            {% endif %}
            border-radius: 10px 10px 0px 0px;
        }

        .gritter-item{
            {% if flag_empresa == 0 %}
                background: #f46424;
            {% elif flag_empresa == 1 %}
                background: #3b8eed;
            {% endif %}
        }

        .gritter-bottom{
            {% if flag_empresa == 0 %}
                background: #f46424;
            {% elif flag_empresa == 1 %}
                background: #3b8eed;
            {% endif %}
            border-radius: 0px 0px 10px 10px;
        }
    </style>
</head>
<body>
    <form>
        <div class="form-header">
            <h2>NPS - TECNOLOGIA DA INFORMAÇÃO</h2>
        </div>

        <div class="form-content">

            <div class="form-group">
                <label>
                    Filial
                    <span class="required">*</span>
                </label>
                <select required style="width: 200px; margin-top: 10px; padding: 5px;" id="filial_nps">
                    <option value="">Choose</option>
                    {% for filial in filiais_nps %}
                        <option value="{{filial.cod_filial_nps}}">{{filial.desc_filial_nps}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>
                    1. Qual o grau de satisfação em relação a cordialidade do time no atendimento dos chamados?
                    <span class="required">*</span>
                </label>
                <div class="radio-group">
                    <div class="radio-option">
                        <span>1</span>
                        <input type="radio" name="satisfaction" class="satisfaction" value="1" required>
                    </div>
                    <div class="radio-option">
                        <span>2</span>
                        <input type="radio" name="satisfaction" class="satisfaction" value="2">
                    </div>
                    <div class="radio-option">
                        <span>3</span>
                        <input type="radio" name="satisfaction" class="satisfaction" value="3">
                    </div>
                    <div class="radio-option">
                        <span>4</span>
                        <input type="radio" name="satisfaction" class="satisfaction" value="4">
                    </div>
                    <div class="radio-option">
                        <span>5</span>
                        <input type="radio" name="satisfaction" class="satisfaction" value="5">
                    </div>
                    <div class="radio-option">
                        <span>6</span>
                        <input type="radio" name="satisfaction" class="satisfaction" value="6">
                    </div>
                    <div class="radio-option">
                        <span>7</span>
                        <input type="radio" name="satisfaction" class="satisfaction" value="7">
                    </div>
                    <div class="radio-option">
                        <span>8</span>
                        <input type="radio" name="satisfaction" class="satisfaction" value="8">
                    </div>
                    <div class="radio-option">
                        <span>9</span>
                        <input type="radio" name="satisfaction" class="satisfaction" value="9">
                    </div>
                    <div class="radio-option">
                        <span>10</span>
                        <input type="radio" name="satisfaction" class="satisfaction" value="10">
                    </div>
                </div>
                <label>
                    Justifique a resposta em caso de nota abaixo de 7:
                </label>
                <textarea id="justification" name="justification"></textarea>
            </div>



            <div class="form-group">
                <label>
                    2. É fácil entrar em contato com o time de TI?
                    <span class="required">*</span>
                </label>
                <div class="radio-group">
                    <div class="radio-option">
                        <span>1</span>
                        <input type="radio" name="easy-contact" class="easy-contact" value="1" required>
                    </div>
                    <div class="radio-option">
                        <span>2</span>
                        <input type="radio" name="easy-contact" class="easy-contact" value="2">
                    </div>
                    <div class="radio-option">
                        <span>3</span>
                        <input type="radio" name="easy-contact" class="easy-contact" value="3">
                    </div>
                    <div class="radio-option">
                        <span>4</span>
                        <input type="radio" name="easy-contact" class="easy-contact" value="4">
                    </div>
                    <div class="radio-option">
                        <span>5</span>
                        <input type="radio" name="easy-contact" class="easy-contact" value="5">
                    </div>
                    <div class="radio-option">
                        <span>6</span>
                        <input type="radio" name="easy-contact" class="easy-contact" value="6">
                    </div>
                    <div class="radio-option">
                        <span>7</span>
                        <input type="radio" name="easy-contact" class="easy-contact" value="7">
                    </div>
                    <div class="radio-option">
                        <span>8</span>
                        <input type="radio" name="easy-contact" class="easy-contact" value="8">
                    </div>
                    <div class="radio-option">
                        <span>9</span>
                        <input type="radio" name="easy-contact" class="easy-contact" value="9">
                    </div>
                    <div class="radio-option">
                        <span>10</span>
                        <input type="radio" name="easy-contact" class="easy-contact" value="10">
                    </div>
                </div>
                <label>
                    Justifique a resposta em caso de nota abaixo de 7:
                </label>
                <textarea name="easy_contact_justification" id="easy_contact_justification"></textarea>
            </div>



            <div class="form-group">
                <label>
                    3. São educados quando precisamos do suporte?
                    <span class="required">*</span>
                </label>
                <div class="radio-group">
                    <div class="radio-option">
                        <span>1</span>

                    </div>
                    <div class="radio-option">
                        <span>2</span>
                        <input type="radio" name="politeness" class="politeness" value="2">
                    </div>
                    <div class="radio-option">
                        <span>3</span>
                        <input type="radio" name="politeness" class="politeness" value="3">
                    </div>
                    <div class="radio-option">
                        <span>4</span>
                        <input type="radio" name="politeness" class="politeness" value="4">
                    </div>
                    <div class="radio-option">
                        <span>5</span>
                        <input type="radio" name="politeness" class="politeness" value="5">
                    </div>
                    <div class="radio-option">
                        <span>6</span>
                        <input type="radio" name="politeness" class="politeness" value="6">
                    </div>
                    <div class="radio-option">
                        <span>7</span>

                    </div>
                    <div class="radio-option">

                    </div>
                    <div class="radio-option">
                        <span>9</span>
                        <input type="radio" name="politeness" class="politeness" value="9">
                    </div>
                    <div class="radio-option">
                        <span>10</span>
                        <input type="radio" name="politeness" class="politeness" value="10">
                    </div>
                </div>
                <label>
                    Justifique a resposta em caso de nota abaixo de 7:
                </label>
                <textarea name="politeness_justification" id="politeness_justification"></textarea>
            </div>


            <div class="form-group">
                <label>
                    4 - Quanto aos recursos de TI(Internet / Maquinas / Roteadores) disponibilizados, qual o grau satisfação?
                    <span class="required">*</span>
                </label>
                <div class="radio-group">
                    <div class="radio-option">
                        <span>1</span>
                        <input type="radio" name="resources" class="resources" value="1" required>
                    </div>
                    <div class="radio-option">
                        <span>2</span>
                        <input type="radio" name="resources" class="resources" value="2">
                    </div>
                    <div class="radio-option">

                        <input type="radio" name="resources" class="resources" value="3">
                    </div>
                    <div class="radio-option">

                    </div>
                    <div class="radio-option">

                </div>
                <label>
                    Justifique a resposta em caso de nota abaixo de 7:
                </label>
                <textarea name="resources_justification" id="resources_justification"></textarea>
            </div>


            <div class="form-group">
                <label>
                    5 - As soluções propostas pelo TI para o atendimento dos chamados são satisfatórias?
                    <span class="required">*</span>
                </label>
                <div class="radio-group">
                    <div class="radio-option">
                        <span>1</span>
                        <input type="radio" name="solutions" class="solutions" value="1" required>
                    </div>
                    <div class="radio-option">
                        <span>2</span>
                        <input type="radio" name="solutions" class="solutions" value="2">
                    </div>
                    <div class="radio-option">
                        <span>3</span>
                        <input type="radio" name="solutions" class="solutions" value="3">
                    </div>
                    <div class="radio-option">
                        <span>4</span>
                        <input type="radio" name="solutions" class="solutions" value="4">
                    </div>
                    <div class="radio-option">
                        <span>5</span>
                        <input type="radio" name="solutions" class="solutions" value="5">
                    </div>
                    <div class="radio-option">
                        <span>6</span>
                        <input type="radio" name="solutions" class="solutions" value="6">
                    </div>
                    <div class="radio-option">
                        <span>7</span>
                        <input type="radio" name="solutions" class="solutions" value="7">
                    </div>
                    <div class="radio-option">
                        <span>8</span>
                        <input type="radio" name="solutions" class="solutions" value="8">
                    </div>
                    <div class="radio-option">
                        <span>9</span>
                        <input type="radio" name="solutions" class="solutions" value="9">
                    </div>
                    <div class="radio-option">
                        <span>10</span>
                        <input type="radio" name="solutions" class="solutions" value="10">
                    </div>
                </div>
                <label>
                    Justifique a resposta em caso de raramente ou nunca:
                </label>
                <textarea name="solutions_justification" id="solutions_justification"></textarea>
            </div>


            <div class="form-group">
                <label>
                    Elogios, criticas e sugestões:
                </label>
                <textarea id="feedback" name="feedback"></textarea>
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button type="button" name="{{email}}" class="envio-nps"
                        style="background-color:
                {% if flag_empresa == 0 %} #f46424; {% elif flag_empresa == 1 %} #3b8eed; {% endif %}
                color: white; border: none; border-radius: 4px; cursor: pointer;">
                    Enviar
                </button>
            </div>
        </div>
    </form>
    <script>
        $('.selectpicker').selectpicker();
    </script>
</body>
</html>
