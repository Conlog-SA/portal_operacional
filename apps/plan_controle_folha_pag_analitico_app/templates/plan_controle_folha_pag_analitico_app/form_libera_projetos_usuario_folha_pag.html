{% load static %}



<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-100">
    <div class="mt-3 d-flex align-items-center justify-content-between div_Titulo">
        <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-arrows-down-to-people" style="color: #f46424;"></i>
            <h1 class=" titlePadraoMenu">Libera Projetos x Usuários</h1>
        </div>
        {% if obj_usuario_logado.cod_filial.cod_empresa.cod_empresa == 12 %}
            <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
        {% else %}
            <img class="logo_cabecalho" src="{% static 'icons/logo-small-deep.png' %}" >
        {% endif %}
    </div>

    <div class="containerApp">
        <form id="frm_libera_proj_usu" name="frm_libera_proj_usu"
              method="POST"
              class="d-flex flex-column align-items-center justify-content-between cl_frm_topo_paginas">
            {% csrf_token %}

            <div class="d-flex justify-content-between align-items-between w-100">
                <hr class="hr_title">
            </div>

        </form>

        <div class="form-group  cl_div_tabela_principal_pagina w-100">
            <div class="d-flex p-2 justify-content-start align-items-between w-100" >
                <div class="d-flex align-items-start justify-content-start w-100 cl_div_loader_gera_pag_2art_terc">
                    <div class="loader" id="loader_libera_proj_usu_folha_pag">
                        <div class="loader-inner">
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex flex-column justify-content-start w-100" style="padding-left: 0.25rem;">
                    &nbsp;&nbsp;
                </div>
                <div class="d-flex flex-column justify-content-start w-100" style="padding-left: 0.25rem;">
                    &nbsp;&nbsp;
                </div>
                <div class="d-flex flex-column justify-content-start w-100" style="padding-left: 0.25rem;">
                    &nbsp;&nbsp;
                </div>
            </div>

            <div class="col-md-12 w-100 h-100">
                <nav class="nav nav-tabs" id="myTab" role="tablist">
                    <button class="nav-link active" id="a_tab_usuario" data-bs-toggle="tab" data-bs-target="#div_form_usuario"
                       role="tab" aria-controls="div_form_usuario" type="button" aria-selected="false"
                       style="border-radius:10px 10px 0 0;" >
                        <i class="fa-solid fa-users-gear" style="color: #f46424;"></i>
                        Registro por Usuário
                    </button>
                    <button class="nav-link " id="a_tab_projeto" data-bs-toggle="tab" data-bs-target="#div_form_projeto"
                       role="tab" aria-controls="div_form_projeto" type="button" aria-selected="false"
                       style="border-radius:10px 10px 0 0;" >
                        <i class="fa-solid fa-diagram-project" style="color: #f46424;"></i>
                        Registro por Projeto
                    </button>
                </nav>
                <div class="tab-content" style="border-radius:0 0 10px 10px;">
                    <div class="tab-pane active" id="div_form_usuario" role="tabpanel" aria-labelledby="a_tab_usuario">
                        <form class="d-flex flex-column align-items-center justify-content-between">
                            <div class="d-flex justify-content-between align-items-between w-100 mb-3">
                                <div class="d-flex flex-column justify-content-end align-items-start  w-100" style="padding-right: 0.25rem;">
                                    <label for="sel_usuarios_folha_pag_tab_usu">Usuário</label>
                                    <select class="selectpicker form-control" id="sel_usuarios_folha_pag_tab_usu"
                                            name="sel_usuarios_folha_pag_tab_usu"
                                            data-live-search="true" title="Selecione o Usuário">
                                        {% for u in lista_usuarios_ativos %}
                                            <option value="{{ u.cod_usu }}">
                                                {{ u.nome_usu }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="d-flex flex-column justify-content-end align-items-start  w-100" style="padding-right: 0.25rem;">
                                    <input type="hidden" id="hd_acao_comp_proj_tab_usu" name="hd_acao_comp_proj_tab_usu"  value="S"/>
                                    <label for="sel_projetos_folha_pag_tab_usu">
                                        Projeto
                                        <button type='button' id="sel_marca_projetos_folha_pag_tab_usu"
                                                name="sel_marca_projetos_folha_pag_tab_usu"
                                                class="btn btn-rounded btn-space"
                                                title="Selecionar todos os projetos"
                                                style="width: 50px;">
                                            <i class="fa-regular fa-square-check"></i>
                                        </button>
                                        <button type='button' id="btn_desmarcar_projetos_folha_pag_tab_usu"
                                                name="btn_desmarcar_projetos_folha_pag_tab_usu"
                                                class="btn btn-rounded btn-space"
                                                title="Limpar seleção"
                                                style="width: 50px;">
                                            <i class="fa-regular fa-square"></i>
                                        </button>
                                    </label>
                                    <select class="selectpicker form-control" id="sel_projetos_folha_pag_tab_usu"
                                            name="sel_projetos_folha_pag_tab_usu"
                                            multiple data-selected-text-format="count > 0"
                                            data-live-search="true"
                                            title="Selecione o projeto">
                                        {% for p in lista_projetos_benner %}
                                            <option value="{{ p.handle_benner }}_{{ p.desc_proj_benner }}_{{p.cod_empresa}}">
                                                {{ p.handle_benner }} - {{ p.desc_proj_benner }}({{ p.nome_empresa }})
                                            </option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="d-flex flex-column justify-content-end  w-100" style="padding-right: 0.25rem;margin-top: 1.1rem;">
                                    <button type="button" name="btn_libera_proj_usuario_tab_usu"
                                              id="btn_libera_proj_usuario_tab_usu"
                                              class="btn btn-primary btn-rounded botaoPrincipal" >
                                          <i class="fa-solid fa-check"></i>
                                        Liberar
                                    </button>
                                </div>
                            </div>

                            <div class="form-group w-100">
                                <div class="col-md-12 w-100 h-100">
                                    <table id="tab_proj_liberados_by_usu"
                                           class="display wrap w-100 cl_tab_principal_pagina">
                                        <thead>
                                            <tr>
                                                <th scope="col"></th>
                                                <th scope="col">Handle Benner</th>
                                                <th scope="col">Projetos</th>
                                                <th scope="col">Libera/Bloqueia</th>
                                            </tr>
                                        </thead>
                                        <tbody>

                                        </tbody>

                                    </table>
                                </div>
                            </div>

                        </form>
                    </div>

                    <div class="tab-pane" id="div_form_projeto" role="tabpanel" aria-labelledby="a_tab_projeto">
                        <form class="d-flex flex-column align-items-center justify-content-between">

                            <div class="d-flex justify-content-between align-items-between w-100 mb-3">

                                <div class="d-flex flex-column justify-content-end align-items-start w-100" style="padding-right: 0.25rem;">
                                    <label for="sel_projetos_folha_pag_tab_proj">Projeto</label>
                                    <select class="selectpicker form-control" id="sel_projetos_folha_pag_tab_proj"
                                            name="sel_projetos_folha_pag_tab_proj"
                                            data-live-search="true"
                                            title="Selecione o projeto">
                                        {% for p in lista_projetos_benner %}
                                            <option value="{{ p.handle_benner }}_{{ p.desc_proj_benner }}" >
                                                {{ p.handle_benner }} - {{ p.desc_proj_benner }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="d-flex flex-column justify-content-end align-items-start  w-100" style="padding-right: 0.25rem;">
                                    <label for="sel_usuarios_folha_pag_tab_proj">
                                        Usuário
                                        <button type='button' id="sel_marca_usuarios_folha_pag_tab_proj"
                                                name="sel_marca_usuarios_folha_pag_tab_proj"
                                                class="btn btn-rounded btn-space"
                                                title="Selecionar todos os projetos"
                                                style="width: 50px;">
                                            <i class="fa-regular fa-square-check"></i>
                                        </button>
                                        <button type='button' id="btn_desmarcar_usuarios_folha_pag_tab_proj"
                                                name="btn_desmarcar_usuarios_folha_pag_tab_proj"
                                                class="btn btn-rounded btn-space"
                                                title="Limpar seleção"
                                                style="width: 50px;">
                                            <i class="fa-regular fa-square"></i>
                                        </button>
                                    </label>
                                    <select class="selectpicker form-control" id="sel_usuarios_folha_pag_tab_proj"
                                            name="sel_usuarios_folha_pag_tab_proj"
                                            multiple data-selected-text-format="count > 3"
                                            data-live-search="true" title="Selecione o(s) Usuário(s)">
                                        {% for u in lista_usuarios_ativos %}
                                            <option value="{{ u.cod_usu }}">{{ u.nome_usu }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="d-flex flex-column justify-content-end w-100" style="padding-right: 0.25rem;margin-top: 1.1rem;">
                                    <button type="button" name="btn_libera_proj_usuario_tab_proj"
                                              id="btn_libera_proj_usuario_tab_proj"
                                              class="btn btn-primary btn-rounded botaoPrincipal" >
                                          <i class="fa-solid fa-check"></i>
                                        Liberar
                                    </button>
                                </div>
                            </div>

                            <div class="form-group w-100">
                                <div class="col-md-12 w-100 h-100">
                                    <table id="tab_proj_liberados_by_proj"
                                           class="display wrap w-100 cl_tab_principal_pagina">
                                        <thead>
                                            <tr>
                                                <th scope="col"></th>
                                                <th scope="col">Usuários</th>
                                                <th scope="col">Libera/Bloqueia</th>
                                            </tr>
                                        </thead>
                                        <tbody>

                                        </tbody>

                                    </table>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
