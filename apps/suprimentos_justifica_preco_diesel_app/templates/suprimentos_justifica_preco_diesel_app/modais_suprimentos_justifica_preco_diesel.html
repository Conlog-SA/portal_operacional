{% load static %}

<!-- Modal Confirma Armazenamento Compras Itens -->
<div id="modal_cad_motivos_justificar_compra_diesel" role="dialog" class="modal">
  <div class="modal-dialog" style="border-radius: 10px;">
    <div class="modal-content" >
      <div class="modal-header"
           style="background-color:#f26522;height: 40px;padding-right: 0.25rem;padding-bottom: 35px;padding-top: 10px;
                  font-size:10px;padding-left: 0.25rem;">
        <div class="row"
             style="margin-left: 0px; margin-right: 0px; margin-bottom: 0px; width: 100%;
                            height: 30px;" >
          <div class="col-md-6" align="left" style="padding-left: 0.25rem;">
            <p>
              <i class="fa-solid fa-message fa-2xl" style="color: #FFFFFF;"></i>
              <span style="color:#ffffff; font-size:12px">Novo Motivo</span>
            </p>
          </div>
          <div class="col-md-6" align="right">
            <button type="button" name="btn_fecha_modal_cad_motivos_justificar_compra_diesel"
                    id="btn_fecha_modal_cad_motivos_justificar_compra_diesel"
                    data-dismiss="modal" aria-hidden="true" class="btn btn-sm btn-rounded">
                <i class="fa-solid fa-circle-xmark fa-2xl" style="color: #FFFFFF;"></i>
            </button>

          </div>
        </div>
      </div>
      <div class="modal-body">
        <form name="frm_motivo_justificativa_preco_diesel" id="frm_motivo_justificativa_preco_diesel"
                    method="post" class="d-flex flex-column align-items-center justify-content-between">

          <div class="d-flex flex-column w-100">
            <label for="txt_desc_motivo_just_compra_diesel" class="label_comp_forms">Descrição do Motivo</label>
            <input type="text" id="txt_desc_motivo_just_compra_diesel"
                   name="txt_desc_motivo_just_compra_diesel"
                   class="form-control"/>
          </div>

          <div class="d-flex flex-column w-100">
            <button type="button" name="btn_add_novo_motivo_just_compra_diesel"
                      id="btn_add_novo_motivo_just_compra_diesel"
                      class="btn btn-primary btn-rounded botaoPrincipal" >
                  <i class="fa-solid fa-check"></i>
                Adicionar
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>
</div>
