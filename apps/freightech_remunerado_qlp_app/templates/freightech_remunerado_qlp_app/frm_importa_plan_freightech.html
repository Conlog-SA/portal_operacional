{% load static %}

{% block link_static_css %}
  <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
  <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
  <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
{% endblock %}

<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-100">
    <div class="mt-3 d-flex align-items-start justify-content-between div_Titulo">
        <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-file-arrow-down fa-2xl" style="color: #f46424;"></i>
            <h1 class=" titlePadraoMenu">Importa Planilhas Remuneração</h1>
        </div>
        <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
    </div>
	<div class="d-flex justify-content-between align-items-between div_Titulo_line">
		<hr class="hr_title">
	</div>

    <div class="containerApp">
        <form id="frm_improta_plan_remunerado" name="frm_improta_plan_remunerado"
              method="POST" enctype="multipart/form-data"
              class="d-flex flex-column align-items-center justify-content-between cl_frm_topo_paginas">
            {% csrf_token %}

            <div class="d-flex mt-3 justify-content-between align-items-between w-100 mb-3">
                <div class="d-flex flex-column w-100" style="padding-right: 0.25rem;">
                    <label>Tipo de planilha</label>
                    <select class="selectpicker form-control" id="sl_arquivo_remunerado"
                            name="sl_arquivo_remunerado"
                            data-live-search="true"
                            title="Selecione o tipo do layout do arquivo que deseja importar">
                        <option value="QLP_ROTA_ADM_EQUIPE">QLP ROTA ADM E EQUIPE</option>
                        <option value="QLP_ROTA_NOTURNA">QLP ROTA NOTURNA</option>
                        <option value="QLP_EQUIPE_VAN">QLP VAN EQUIPE</option>
                        <option value="QLP_VAN_NOTURNA">QLP VAN NOTURNA</option>
                        <option value="QLP_AS_ADM_ENTREGA">QLP AS ADM E EQUIPE</option>
                        <option value="QLP_AS_NOTURNA">QLP AS NOTURNA</option>
                        <option value="QLP_ARMAZEM_ADM_ENTREGA">QLP ARMAZEM ADM E EQUIPE</option>
                        <option value="QLP_EMPURRADA_ADM_ENTREGA">QLP EMPURRADA ADM E EQUIPE</option>
                        <option value="QLP_INSUMOS_ADM_ENTREGA">QLP INSUMOS ADM E EQUIPE</option>
                    </select>
                </div>

                <div class="d-flex flex-column w-100" style="padding-left: 0.25rem;">
                    &nbsp;&nbsp;
                </div>
                <div class="d-flex flex-column w-100" style="padding-left: 0.25rem;">
                    &nbsp;&nbsp;
                </div>

            </div>

            <div class="d-flex justify-content-between align-items-between w-100">
                <div class="d-flex flex-column w-100">
                    <input type="file" name="fl_arquivo_remunerado" id="fl_arquivo_remunerado"
                           class="containerApp"
                           placeholder='Selecione um arquivo válido, conforme tipo selecionado ...'
                           accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"/>
                </div>
            </div>



            <div class="d-flex justify-content-between align-items-between w-100 mb-3" >
                <div class="d-flex flex-column w-100 cl_div_loader">
                    <div class="loader" id="loader_frm_imp_plan_freightech">
                        <div class="loader-inner">
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex flex-column w-100">
                    &nbsp;&nbsp;
                </div>
                <div class="d-flex flex-column w-100">
                    &nbsp;&nbsp;
                </div>

            </div>

        </form>
        <div id="div_conteudo_plan_remunerado_importado" class="form-group  cl_div_tabela_principal_pagina w-100">
            <div class="col-md-12 w-100 h-100">
                <nav>
                    <div class="nav nav-tabs" id="myTab" role="tablist">
                        <button class="nav-link active" id="a_tab_param_plan_rem" data-bs-toggle="tab"
                                data-bs-target="#div_tab_param_plan_rem" type="button" role="tab"
                                aria-controls="div_tab_param_plan_rem" aria-selected="true">
                            <i class="fa-regular fa-lightbulb" style="color: #f46424;"></i>
                            Parâmetros Plan Remuneração
                        </button>
                        <button class="nav-link" id="a_tab_cargos_rem_senior" data-bs-toggle="tab"
                                data-bs-target="#div_tab_cargos_rem_senior" type="button" role="tab"
                                aria-controls="div_tab_cargos_rem_senior" aria-selected="false">
                            <i class="fa-solid fa-file-signature" style="color: #f46424;"></i>
                            Cargos Remunerado x Senior
                        </button>
                    </div>
                </nav>


                <div class="tab-content" style="border-radius:0 0 10px 10px;">
                    <div class="tab-pane active" id="div_tab_param_plan_rem" name="div_tab_param_plan_rem"
                         role="tabpanel"
                         aria-labelledby="a_tab_param_plan_rem">





                    </div>

                    <div class="tab-pane" id="div_tab_cad_ideia_comitec" role="tabpanel"
                         aria-labelledby="a_tab_cad_ideia_comitec">


                    </div>


                </div>
            </div>



        </div>
    </div>
</div>
