{% load static %}

{% block link_static_css %}
     <!-- Bootstrap CSS first -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Gritter CSS -->
    <link rel="stylesheet" href="{% static 'libs/jquery_gritter_notifications_1_7_4/css/jquery_gritter.css' %}">
    <!-- Then your custom CSS -->
    <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
    <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
    <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
    <link rel="stylesheet" href="{% static 'css/nps_ti_app/nps_ti.css' %}" />
    <!-- Bootstrap-select CSS after Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'libs/bootstrap_select_1_14_0/css/bootstrap-select.css' %}"/>

    <!-- JavaScript dependencies in correct order -->
    <!-- jQuery first -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <!-- Popper.js before Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <!-- Bootstrap JS before bootstrap-select -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>
    <!-- Gritter after jQuery -->
    <script src="{% static 'libs/jquery_gritter_notifications_1_7_4/js/jquery_gritter.js' %}"></script>
    <!-- DataTables after jQuery -->
    <script src="https://cdn.datatables.net/1.10.7/js/jquery.dataTables.min.js"></script>
    <!-- Bootstrap-select JS last -->
    <script src="{% static 'libs/bootstrap_select_1_14_0/js/bootstrap-select.js' %}"></script>
    <!-- Your custom JS -->
    <script src="{% static 'controllers/nps_ti_app/nps_ti_app_controller.js' %}" type="text/javascript"></script>


{% endblock %}
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NPS | TI 2024</title>
    <style>
        body {
            font-family: Arial, sans-serif;

            margin: 1rem auto;
            padding: 1rem;
        }

        @media (max-width: 479px) {
            body {
                font-size:36px;
                max-width:95vw;
            }

            input[type="radio"] {
                width:40px;
                height:40px;
            }

            option {
                font-size: 14px;
            }

            textarea {
                height: 10rem;
            }

            .envio-nps {
                padding: 18px 60px;
            }
        }

        @media (min-width: 480px) {
            body {
                font-size: 14px;
                max-width:70vw;
            }

            input[type="radio"] {
                width:1rem;
                height:1rem;
            }

            .envio-nps {
                padding: 8px 16px;
            }
        }

        .form-header {
            background-color: #f46424;
            color: white;
            padding: 15px;
            border-radius: 8px 8px 0 0;
        }
        .form-content {
            border: 1px solid #ddd;
            border-radius: 0 0 8px 8px;
            padding: 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        .required {
            color: red;
        }
        .email-section {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #666;
            margin-bottom: 0.75rem;
        }
        .radio-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.75rem;
            margin-bottom:1.5rem;
        }
        .radio-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }
        textarea {
            width: 100%;
            min-height: 5rem;
            margin-top: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 0.2rem;
            padding: 0.4rem;
        }
        .points {
            color: #666;
            float: right;
            font-size: 0.9em;
        }
        .gritter-top{
            {% if flag_empresa == 0 %}
                background: #f46424;
            {% elif flag_empresa == 1 %}
                background: #3b8eed;
            {% endif %}
            border-radius: 10px 10px 0px 0px;
        }

        .gritter-item{
            {% if flag_empresa == 0 %}
                background: #f46424;
            {% elif flag_empresa == 1 %}
                background: #3b8eed;
            {% endif %}
        }

        .gritter-bottom{
            {% if flag_empresa == 0 %}
                background: #f46424;
            {% elif flag_empresa == 1 %}
                background: #3b8eed;
            {% endif %}
            border-radius: 0px 0px 10px 10px;
        }
    </style>
</head>
<body>
    <form>
        <div class="form-header">
            <h2>FORMULÁRIO DE INCORPORAÇÃO</h2>
        </div>

        <div class="form-content">

            <div class="form-group d-flex flex-column">
                <label>
                    Escolha uma foto para sua apresentação.
                    <span class="required">*</span>
                </label>
                <img id="img_preview" style="width:100px;height:100px"></img>
                <input name="{{item.cod_item_check}}@{{cod_check_aplicado}}" class="responsive-font file-check-post input-item relatos" type="file" style="color:#444;font-size:0.85rem;border:0;width:80%;max-width:100%;margin-top:10px" accept="image/png, image/gif, image/jpeg" onchange="loadFile(event)"></input>
            </div>

            <div class="form-group d-flex flex-column">
                <label>
                    Qual seu nivel escolar concluido?
                    <span class="required">*</span>
                </label>
                <select required style="width: 200px; margin-top: 10px; padding: 5px;" id="nivel_escolar">
                    <option value="">Selecione o nivel</option>
                    <option value="1">Ensino médio</option>
                    <option value="2">Ensino superior</option>
                </select>
            </div>

            <div class="form-group d-flex flex-column">
                <label>
                    Está cursando algum
                    <span class="required">*</span>
                </label>
                <select required style="width: 200px; margin-top: 10px; padding: 5px;" id="nivel_escolar_status">
                    <option value="">Status</option>
                    <option value="1">Cursando</option>
                    <option value="2">Finalizado</option>
                    <option value="3">Status</option>
                </select>
            </div>


            <div class="form-group d-flex flex-column">
                <label>
                    4 - Quanto aos recursos de TI(Internet / Maquinas / Roteadores) disponibilizados, qual o grau satisfação?
                    <span class="required">*</span>
                </label>
                <select required style="width: 200px; margin-top: 10px; padding: 5px;" id="filial_nps">
                    <option value="">Choose</option>
                    {% for filial in filiais_nps %}
                        <option value="{{filial.cod_filial_nps}}">{{filial.desc_filial_nps}}</option>
                    {% endfor %}
                </select>
            </div>


            <div class="form-group d-flex flex-column">
                <label>
                    5 - As soluções propostas pelo TI para o atendimento dos chamados são satisfatórias?
                    <span class="required">*</span>
                </label>

                <select required style="width: 200px; margin-top: 10px; padding: 5px;" id="filial_nps">
                    <option value="">Choose</option>
                    {% for filial in filiais_nps %}
                        <option value="{{filial.cod_filial_nps}}">{{filial.desc_filial_nps}}</option>
                    {% endfor %}
                </select>
            </div>


            <div class="form-group">
                <label>
                    Elogios, criticas e sugestões:
                </label>
                <textarea id="feedback" name="feedback"></textarea>
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button type="button" name="{{email}}" class="envio-nps"
                        style="background-color:
                {% if flag_empresa == 0 %} #f46424; {% elif flag_empresa == 1 %} #3b8eed; {% endif %}
                color: white; border: none; border-radius: 4px; cursor: pointer;">
                    Enviar
                </button>
            </div>
        </div>
    </form>
    <script>
        $('.selectpicker').selectpicker();

        var loadFile = function(event) {
            var img_preview = document.getElementById('img_preview');
            img_preview.src = URL.createObjectURL(event.target.files[0]);
            img_preview.onload = function() {
              URL.revokeObjectURL(img_preview.src) // free memory
            }
        };
    </script>
</body>
</html>
