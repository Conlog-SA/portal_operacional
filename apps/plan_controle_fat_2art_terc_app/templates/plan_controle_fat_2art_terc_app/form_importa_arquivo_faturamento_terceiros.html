{% load static %}


<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-100">
    <div class="mt-3 d-flex align-items-center justify-content-between div_Titulo">
        <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-file-arrow-down"></i>
            <h1 class=" titlePadraoMenu">Importa Arquivo Faturamento Terceiros</h1>
        </div>
        {% if obj_usuario_logado.cod_filial.cod_empresa.cod_empresa == 12 %}
            <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
        {% else %}
            <img class="logo_cabecalho" src="{% static 'icons/logo-small-deep.png' %}" >
        {% endif %}
    </div>
	<div class="d-flex justify-content-between align-items-between div_Titulo_line">
		<hr class="hr_title">
	</div>

    <div class="containerApp">
        <form id="formUploadArquivosFatTerceiros" name="formUploadArquivosFatTerceiros"
              method="POST" enctype="multipart/form-data"
              class="d-flex flex-column align-items-center justify-content-between cl_frm_topo_paginas">
            {% csrf_token %}

            <div class="d-flex justify-content-between align-items-between w-100">
                <div class="d-flex flex-column w-100">
                    <input type="file" name="campoArquivoImpArqFatTerc" id="campoArquivoImpArqFatTerc"
                           class="containerApp"
                           placeholder='Selecione um arquivo 2art válido...'
                           accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"/>
                </div>
            </div>

            <div class="d-flex mt-3 justify-content-between align-items-between w-100 mb-4">
                <div class="d-flex flex-column w-100" style="padding-right: 0.25rem;">
                    <button type="button" name="btnImportaArquivoAcresDescFatTerc"
                            id="btnImportaArquivoAcresDescFatTerc"
                            class="btn btn-primary btn-rounded botaoPrincipal" disabled="disabled">
                        <i class="fa-solid fa-file-import"></i>
                        Importar Acrésc./Desc.
                    </button>
                </div>

                <div class="d-flex flex-column w-100" style="padding-left: 0.25rem;">
                    <button type="button" name="btnImportaArquivoPagamentosExtraFatTerc"
                            id="btnImportaArquivoPagamentosExtraFatTerc"
                            class="btn btn-primary btn-rounded botaoPrincipal" disabled="disabled">
                        <i class="fa-solid fa-file-import"></i>
                        Importar Pagamentos Extras
                    </button>
                </div>
                <div class="d-flex flex-column w-100">
                    &nbsp;&nbsp;
                </div>
                <div class="d-flex flex-column w-100">
                    &nbsp;&nbsp;
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-between w-100 mb-3" >
                <div class="d-flex flex-column w-100 cl_div_loader">
                    <div class="loader" id="loader_arq_fat">
                        <div class="loader-inner">
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex flex-column w-100">
                    &nbsp;&nbsp;
                </div>
                <div class="d-flex flex-column w-100">
                    &nbsp;&nbsp;
                </div>

            </div>

        </form>
        <div id="divConteudoImportadoFatTerc" class="form-group  cl_div_tabela_principal_pagina w-100">



        </div>
    </div>
</div>
