{% load static %}

{% block link_static_css %}
    <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
    <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
    <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
    <link rel="stylesheet" href="{% static 'css/safety_relatos_app/safety_relatos_app.css' %}" />

{% endblock %}

<div class="d-flex flex-column align-items-center justify-content-start w-100 h-100 text-white" >
   <div class="d-flex align-items-end justify-content-between div_Titulo" style="padding-bottom:15px;width:100%;border-radius:0px;">
       <div class="d-flex justify-content-start align-items-center" style="width: 90%;">
            <i class="fa-solid fa-file-signature" style="font-size:30px; margin-left:0px; margin-right:15px; color:#cf6a15;"></i>
           <h1 class="titlePadraoMenu" style="margin-left:0px;font-weight: 500;">Registro de Ocorrências</h1>
       </div>
       <div class="d-flex flex-column justify-content-center align-items-end mb-1" style="width: 10%;">
           <i class="fa-solid fa-helmet-safety" style="font-size:30px;color:{{cor_empresa}}"></i>
       </div>
   </div>
    <div id="div_corpo_registro_ocorrencia" class="containerApp w-100 h-100" style="min-height:fit-content;background: rgba(24, 27, 30, 0.90);">
        <form class="h-100" id="form_preenche_check" name="form_preenche_check">
            {% csrf_token %}
            <div class="d-flex flex-column justify-content-start align-items-center w-100 h-100" id="div_tab_new_check">
                <div class="d-flex flex-column justify-content-start align-items-around w-100 h-100 p-3">
                    <div class="d-flex flex-column justify-content-start align-items-around w-100 h-100">
                       <label for="sl_cod_unidade_reg_ocor"> Unidade: </label>
                        <select class="selectpicker form-control responsive-font campo-obgo-reg-ocor"
                                id="sl_cod_unidade_reg_ocor" name="sl_cod_unidade_reg_ocor"
                                placeholder="Selecione a unidade" data-live-search="true"
                                title="Selecione a unidade">
                            {% autoescape off %}
                                {{options_select_unidade}}
                            {% endautoescape %}
                        </select>
                    </div>
                    <div class="d-flex flex-column justify-content-start align-items-around w-100 h-100">
                       <label for="sl_negocio_reg_ocor">Negócio:</label>
                       <select class="selectpicker form-control responsive-font campo-obgo-reg-ocor"
                               id="sl_negocio_reg_ocor" name="sl_negocio_reg_ocor"
                               placeholder="Escolha o negócio" title="Escolha o negócio">
                           <option value="1">Passageiros</option>
                           <option value="2">Celulose</option>
                           <option value="3">Retroportuária</option>
                           <option value="4">Armazém</option>
                       </select>
                    </div>
                    <div class="d-flex justify-content-start align-items-around w-100 h-100 ">
                        <div class="d-flex flex-column justify-content-start align-items-between w-50 pe-1">
                            <label for="sl_tipo_relato_reg_ocor">Tipo:</label>
                            <select class="selectpicker form-control responsive-font campo-obgo-reg-ocor"
                                    id="sl_tipo_relato_reg_ocor" name="sl_tipo_relato_reg_ocor"
                                    placeholder="Escolha o tipo" title="Escolha o tipo">
                                <option value="1">Próprio</option>
                                <option value="2">Terceiro</option>
                            </select>
                        </div>
                        <div class="d-flex flex-column justify-content-start align-items-around w-50">
                            <label for="sl_turno_reg_ocor">Turno:</label>
                            <select class="selectpicker form-control responsive-font campo-obgo-reg-ocor"
                                    id="sl_turno_reg_ocor" name="sl_turno_reg_ocor"
                                    placeholder="Selecione o turno" title="Selecione o turno">
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex flex-column justify-content-start align-items-around w-100 h-100">
                        <label class="responsive-font" for="txt_nome_empresa_envolvida">Nome da empresa envolvida:</label>
                        <input type="text" class="form-control responsive-font"
                               id="txt_nome_empresa_envolvida" name="txt_nome_empresa_envolvida"
                               title="Informe o nome da empresa envolvida">
                    </div>

                    <div class="d-flex justify-content-start align-items-around w-100 h-100">
                        <div class="d-flex flex-column justify-content-start align-items-between w-50 pe-1">
                            <label for="sl_nexo_reg_ocor">Nexo:</label>
                            <select class="selectpicker form-control responsive-font campo-obgo-reg-ocor"
                                    id="sl_nexo_reg_ocor" name="sl_nexo_reg_ocor"
                                    placeholder="Selecione o tipo de nexo" title="Selecione o tipo de nexo">
                                <option value="1">Típico</option>
                                <option value="2">Trajeto</option>
                            </select>
                        </div>
                        <div class="d-flex flex-column justify-content-start align-items-between w-50">
                            <label for="sl_local_reg_ocor">Local da ocorrência:</label>
                            <select class="selectpicker form-control responsive-font campo-obgo-reg-ocor"
                                    id="sl_local_reg_ocor" name="sl_local_reg_ocor"
                                    placeholder="Selecione o local da ocorrência"
                                    title="Selecione o local da ocorrência">
                                {% for ocor in list_itens_campo_local_ocorrencia %}
                                    <option value="{{ocor.cod_componente}}">{{ocor.desc_componente}}</option>
                                {% endfor %}
                            </select>
                        </div>

                    </div>

                    <div class="d-flex flex-column justify-content-start align-items-around w-100 h-100">
                        <label class="responsive-font" for="txt_desc_detalhe_area">Área detalhada:</label>
                        <input type="text" class="form-control responsive-font campo-obgo-reg-ocor"
                               id="txt_desc_detalhe_area" name="txt_desc_detalhe_area"
                               title="Informe a área detalhada">
                    </div>
                    <div class="d-flex flex-column justify-content-start align-items-around w-100 h-100">
                       <label for="sl_atividade_reg_ocor">Atividade:</label>
                       <select class="selectpicker form-control responsive-font campo-obgo-reg-ocor"
                               id="sl_atividade_reg_ocor" name="sl_atividade_reg_ocor"
                               placeholder="Selecione a atividade" title="Selecione a atividade">
                           {% for atv in list_itens_campo_atividade %}
                            <option value="{{atv.cod_componente}}">{{atv.desc_componente}}</option>
                           {% endfor %}
                       </select>
                    </div>
                    <div class="d-flex flex-column justify-content-start align-items-around w-100 h-100">
                       <label for="sl_natureza_reg_ocor">Natureza:</label>
                       <select class="selectpicker form-control responsive-font campo-obgo-reg-ocor"
                               id="sl_natureza_reg_ocor" name="sl_natureza_reg_ocor"
                               placeholder="Selecione a natureza" title="Selecione a natureza">
                           {% for nat in list_itens_campo_natureza %}
                            <option value="{{nat.cod_componente}}">{{nat.desc_componente}}</option>
                           {% endfor %}
                       </select>
                    </div>
                    <div class="d-flex flex-column justify-content-start align-items-around w-100 h-100">
                        <label for="dt_ocorrencia_reg_ocor">Data e hora da ocorrência:</label>
                        <div class="d-flex justify-content-between align-items-between w-100">
                            <div class="d-flex flex-column align-items-start pe-1" style="width: 60%;">
                                <input type="date" class="form-control responsive-font campo-obgo-reg-ocor"
                                       id="dt_ocorrencia_reg_ocor" name="dt_ocorrencia_reg_ocor"
                                       title="Informe a data de ocorrência">
                            </div>
                            <div class="d-flex flex-column justify-content-start align-items-between" style="width: 40%;">
                                <input type="time" class="form-control responsive-font campo-obgo-reg-ocor"
                                       id="hr_ocorrencia_reg_ocor" name="hr_ocorrencia_reg_ocor"
                                       title="Informe a hora da ocorrência">
                            </div>
                        </div>
                    </div>
                    <div class="d-flex flex-column justify-content-start align-items-around w-100 h-100">
                       <label for="sl_classificacao_reg_ocor">Classificação:</label>
                       <select class="selectpicker form-control responsive-font campo-obgo-reg-ocor"
                               id="sl_classificacao_reg_ocor" name="sl_classificacao_reg_ocor"
                               placeholder="Selecione a classificação da ocorrência"
                               title="Selecione a classificação da ocorrência">
                           <option value="1">FATAL</option>
                           <option value="2">LTI(Lesão com afastamento)</option>
                           <option value="3">MDI/MTI/Atestado do dia</option>
                           <option value="4">SAA</option>
                           <option value="5">TRAJETO</option>
                           <option value="6">QA/IN</option>
                       </select>
                    </div>
                    <div class="d-flex flex-column justify-content-start align-items-around w-100 h-100">
                       <label for="sl_risco_real_reg_ocor">Risco real:</label>
                       <select class="selectpicker form-control responsive-font campo-obgo-reg-ocor"
                               id="sl_risco_real_reg_ocor" name="sl_risco_real_reg_ocor"
                               placeholder="Selecione o risco" title="Selecione o risco">
                           <option value="1">LEVE</option>
                           <option value="2">MÉDIO</option>
                           <option value="3">GRAVE</option>
                           <option value="4">PSIF/HPI</option>
                       </select>
                    </div>
                    <div class="d-flex flex-column justify-content-start align-items-around w-100 h-100">
                       <label for="sl_causa_reg_ocor">Causa:</label>
                       <select class="selectpicker form-control responsive-font campo-obgo-reg-ocor"
                               id="sl_causa_reg_ocor" name="sl_causa_reg_ocor"
                               placeholder="Selecione a causa" title="Selecione a causa">
                           {% for causa in list_itens_campo_causa %}
                            <option value="{{causa.cod_componente}}">{{causa.desc_componente}}</option>
                           {% endfor %}
                       </select>
                    </div>
                    <div class="d-flex justify-content-between align-items-around w-100 h-100 p-2">
                        <button type="button" class="btn-voltar-menu-safety" style="border-style:none;background-color:rgba(0,0,0,0);height:fit-content">
                            <div style="display:flex;flex-direction:column">
                                <i class="fa-solid fa-arrow-left" style="color:{{cor_empresa}};font-size:32px"></i>
                                <b style="color:white;font-size:12px">Voltar</b>
                            </div>
                        </button>
                        <button class="create-check-registro-ocorrencias" type="button" style="border-style:none;background-color:rgba(0,0,0,0);height:fit-content">
                            <div style="display:flex;flex-direction:column">
                                <i class="fa-solid fa-circle-plus" style="font-size:32px; margin-left:0px;color:{{cor_empresa}};"></i>
                                <b style="color:white;font-size:12px">Gerar check</b>
                            </div>
                        </button>
                        </div>
                </div>
            </div>
        </form>
    </div>
</div>
