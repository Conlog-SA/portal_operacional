{% load static %}

{% block link_static_css %}
    <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
    <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
    <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
    <link rel="stylesheet" href="{% static 'css/safety_blitz_trajeto_bicicleta_app/safety_blitz_trajeto_bicicleta_app.css' %}" />

{% endblock %}

<div class="d-flex flex-column align-items-center justify-content-start text-white w-95" style="margin-right:0px;width:100%;height:100svh">
   <div class="d-flex align-items-end justify-content-between div_Titulo" style="padding-bottom:15px;width:100%;border-radius:0px;">
       <div class="d-flex align-items-center justify-content-center">
           <i class="fa-solid fa-bicycle" style="font-size:50px; margin-left:0px; margin-right:15px; color:#cf6a15;"></i>
           <h1 class="titlePadraoMenu" style="margin-left:0px;">Blitz de Trajeto</h1>
       </div>
   </div>
    <div id="div_corpo_relato_blitz_trajeto" class="containerApp w-100 h-100" style="min-height:fit-content;">
        <div class="form-group form_div_check w-100 h-100" >
            <div class="col-md-12 w-100 h-100">
                <form class="h-100" id="form_preenche_check" name="form_preenche_check">
                    <div class="tab-content h-100" style="border-radius:0 0 10px 10px; font-size:15px">
                        <div class="tab-pane active h-100" id="div_tab_new_check" role="tabpanel" aria-labelledby="a_tab_new_check">
                                <div class="h-100" style="text-align:left;flex-direction:column;justify-content:space-between;display:flex">
                                    <div style="padding:15px;padding-right:30px;padding-left:30px">
                                        <div class="form-group">
                                           <label for="unidade_colaborador_bicicleta"> Unidade: </label>
                                            <select class="selectpicker form-control responsive-font" id="unidade_colaborador_bicicleta" name="unidade_colaborador_bicicleta" placeholder="Selecione a unidade" data-live-search="true">
                                                {% autoescape off %}
                                                    {{options_select_unidade}}
                                                {% endautoescape %}
                                            </select>
                                        </div>
                                        <div id="div_situacao_relatado" class="form-group">
                                           <label class="responsive-font" for="situacao_avaliado_bicicleta">Quem está sendo descrito?</label>
                                           <select class="selectpicker form-control responsive-font" id="situacao_avaliado_bicicleta" name="situacao_avaliado_bicicleta" placeholder="Escolha a situação">
                                               <option value="1">Funcionario Conlog/Deep</option>
                                               <option value="2">Funcionario Ambev</option>
                                               <option value="3">Freteiro</option>
                                               <option value="4">Terceiros</option>
                                           </select>
                                        </div>
                                        <div id="div_avaliado_bicicleta" class="form-group">
                                            <label class="responsive-font" for="nome_avaliado_bicicleta">Nome do avaliado:</label>
                                            <select class="selectpicker form-control responsive-font" id="nome_avaliado_bicicleta" name="nome_avaliado_bicicleta" placeholder="Selecione o operador" data-live-search="true" disabled>
                                            </select>
                                        </div>
                                        <div id="div_avaliado_terceiro_bicicleta" class="form-group hidden-div">
                                            <label class="responsive-font" for="nome_avaliado_terceiro_bicicleta">Nome do avaliado:</label>
                                            <input type="text" class="form-control responsive-font" id="nome_avaliado_terceiro_bicicleta" name="nome_avaliado_terceiro_bicicleta">
                                        </div>
                                    </div>
                                    <div class="w-100" style="justify-content:space-between;display:flex;padding-right:1rem;padding-left:2rem;margin-top:2rem;margin-bottom:2rem;height:3rem">
                                        <button type="button" class="btn-voltar-menu-safety" style="border-style:none;background-color:rgba(0,0,0,0);height:fit-content">
                                            <div style="display:flex;flex-direction:column">
                                                <i class="fa-solid fa-arrow-left" style="color:#f46424;font-size:32px"></i>
                                                <b style="color:white;font-size:14px">Voltar</b>
                                            </div>
                                        </button>
                                        <button class="create-check-blitz-trajeto-bicicleta" type="button" style="border-style:none;background-color:rgba(0,0,0,0);height:fit-content">
                                            <div style="display:flex;flex-direction:column">
                                                <i class="fa-solid fa-circle-plus" style="font-size:32px; margin-left:0px;color:#f46424;"></i>
                                                <b style="color:white;font-size:14px">Gerar check</b>
                                            </div>
                                        </button>
                                    </div>
                                </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
