{% load static %}

<div role="dialog" class="modal" id="modal_criar_projeto">
    <div class="modal-dialog" style="border-radius: 10px;max-width: 350px; width: 350px;">
        <div class="modal-content">
          <div class="modal-header"style="background-color:#f26522;height: 40px; font-size:8px;">
            <div style="width: 350px;height: 30px;" >

              <div class="d-flex justify-content-between align-items-center">
                  <p style="margin-bottom: 0!important;">
                      <i class="fa-solid fa-list-check fa-2xl"></i>
                      <span style='color:#ffffff; font-size:12px'>
                          Converter para Projeto
                      </span>
                  </p>
                  <button type="button"
                            data-dismiss="modal" aria-hidden="false" id="btn_fecha_modal_criar_proj"
                            name="btn_fecha_modal_criar_proj" class="btn btn-sm btn-rounded">
                        <i class="fa-solid fa-circle-xmark fa-2xl" style="color: #FFFFFF;"></i>
                  </button>
              </div>
            </div>
          </div>
          <div class="modal-bodymodal-body flex">
              <div class="d-flex justify-content-between align-items-between w-100">
                  <h3 style="color:#000000; font-size:13px">Você tem certeza que deseja transformar essa ideia em projeto?</h3>
              </div>
              <div class="d-flex align-items-center justify-content-evenly">
                <button type="button" id="btn_cria_projeto" name="btn_cria_projeto"
                        class="btn btn-primary btn-rounded botaoPrincipal" >Sim</button>
                <button type="button" id="btn_não_cria_projeto" name="btn_não_cria_projeto"
                        class="btn btn-primary btn-rounded botaoPrincipal">Não</button>
              </div>
          </div>
        </div>
      </div>
    </div>
</div>

<div role="dialog" class="modal" id="modal_abrir_projeto">
    <div class="modal-dialog" style="border-radius: 10px;max-width: 350px; width: 350px;">
        <div class="modal-content">
          <div class="modal-header"
               style="background-color:#f26522;height: 40px;padding-right: 5px;padding-bottom: 20px;
               padding-top: 20px;font-size:10px;">
            <div class="row"
                 style="margin-left: 0px;margin-right: 0px;margin-bottom: 0px;width: 350px;height: 30px;" >
              <div class="col-md-6" align="left" style="padding-top: 8px;padding-left: 5px;">
              </div>
              <div class="col-md-6" align="right">
                  <span>projeto criado</span>
                  <button type="button"
                        data-dismiss="modal" aria-hidden="false" id="btn_fecha_modal_proj_frm_proj"
                        name="btn_fecha_teste" class="btn btn-sm btn-rounded">
                    <i class="fa-solid fa-circle-xmark fa-2xl" style="color: #FFFFFF;"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="modal-body flex">
              <div class="d-flex justify-content-between align-items-between w-100">
              </div>

          </div>
        </div>
      </div>
    </div>
</div>


<div role="dialog" class="modal" id="modal_editar_projeto">
    <div class="modal-dialog" style="border-radius: 10px;max-width: 350px; width: 350px;">
        <div class="modal-content">
          <div class="modal-header"
               style="background-color:#f26522;height: 40px;padding-right: 5px;padding-bottom: 20px;
               padding-top: 20px;font-size:10px;">
            <div class="row"
                 style="margin-left: 0px;margin-right: 0px;margin-bottom: 0px;width: 350px;height: 30px;" >
              <div class="col-md-6" align="left" style="padding-top: 8px;padding-left: 5px;">
              </div>
              <div class="col-md-6" align="right">
                  <span>EDITAR PROJETO</span>
                  <button type="button"
                        data-dismiss="modal" aria-hidden="false" id="btn_fecha_modal_proj_frm_proj"
                        name="btn_fecha_modal_proj_frm_proj" class="btn btn-sm btn-rounded">
                    <i class="fa-solid fa-circle-xmark fa-2xl" style="color: #FFFFFF;"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
</div>

{% include 'ti_comitec_app/modal_abrir_edita_projeto.html' %}
