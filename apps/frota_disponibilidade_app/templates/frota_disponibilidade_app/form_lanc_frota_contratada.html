{% load static %}


<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-100">
    <div class="mt-3 d-flex align-items-start justify-content-between div_Titulo">
        <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-comment-dollar fa-2xl" alt="Importar 2artd" style="color: #f46424;"></i>
            <h1 class=" titlePadraoMenu">{{ desc_menu_principal }}</h1>
        </div>
        <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
    </div>
	<div class="d-flex justify-content-between align-items-between div_Titulo_line">
		<hr class="hr_title">
	</div>

    <div class="containerApp">
        <form id="formLancFrotaContratada" name="formLancFrotaContratada"
              method="POST"
              class="d-flex flex-column align-items-center justify-content-between cl_frm_topo_paginas">
            {% csrf_token %}

            <div class="d-flex justify-content-between align-items-between w-100 mb-3">
                <div class="d-flex flex-column w-100" style="padding-right: 0.25rem;">
                    <label>
                        Projeto
                        <select class="selectpicker form-control" id="listProjetosFrotaContratada"
                                name="listProjetosFrotaContratada"
                                data-live-search="true"
                                title="Selecione o projeto">
                            {%  if tipo_usuario == 'C' %}
                                {% for p in lista_projetos %}
                                    <option value="{{ p.cod_projeto }}">{{p.desc_proj }}</option>
                                {% endfor %}
                            {%  endif %}
                            {%  if tipo_usuario == 'U' %}
                                {% for p in lista_projetos %}
                                    <option value="{{ p.cod_projeto.cod_projeto }}">{{p.cod_projeto.desc_proj }}</option>
                                {% endfor %}
                            {%  endif %}
                        </select>
                    </label>
                </div>

                <div class="d-flex flex-column w-100"
                     style="padding-left: 0.25rem; padding-right: 0.25rem">
                    <label for="textFieldPeriodoPesqFormFrotaContratada">
                        Competência *
                        <input type="month" class="form-control " id="textFieldPeriodoPesqFormFrotaContratada">
                    </label>
                </div>

                <div class="d-flex flex-column w-100"
                     style="padding-left:0.25rem; padding-top: 1.60rem;">
                    <button type="button" name="btnPesqLancFrotaContratada" id="btnPesqLancFrotaContratada"
                            class="btn btn-primary btn-rounded botaoPrincipal">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Pesquisar
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-between w-100">
                <i class="fa-solid fa-arrow-right-to-bracket" style="color: #f46424;"></i>
                IMPORTA DADOS RETROATIVOS
            </div>
            <div class="d-flex justify-content-between align-items-between w-100">
                <hr class="hr_title">
            </div>

            <div class="d-flex justify-content-between align-items-between w-100">
                <div class="d-flex flex-column w-100">
                    <input type="file" name="campoArquivoFrotaContratada" id="campoArquivoFrotaContratada"
                           class="containerApp"
                           placeholder='Selecione um arquivo válido...'
                           accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"/>
                </div>
                <div class="d-flex flex-column w-25" style="padding-right:0.25rem;">
                    <button type="button" name="btnImportaArqFrotaContratada" id="btnImportaArqFrotaContratada"
                            class="btn btn-primary btn-rounded botaoPrincipal" disabled="disabled">
                        <i class="fa-solid fa-file-arrow-down"></i>
                        Importar Arquivo
                    </button>
                </div>
                <div class="d-flex flex-column w-25" style="padding-left:0.25rem;">
                    <button type="button" name="btnNovoImportaArqFrotaContratada" id="btnNovoImportaArqFrotaContratada"
                            class="btn btn-primary btn-rounded botaoPrincipal" disabled="disabled">
                        <i class="fa-solid fa-file-arrow-down"></i>
                        Novo
                    </button>

                </div>
            </div>



            <div class="d-flex justify-content-between align-items-between w-100 mb-4" >
                <div class="d-flex align-items-end w-100 cl_div_loader_gera_pag_2art_terc">
                    <div class="loader" id="loader_frota_contratada">
                        <div class="loader-inner">
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex flex-column w-100">
                    &nbsp;&nbsp;
                </div>
                <div class="d-flex flex-column w-100">

                </div>
                <div class="d-flex flex-column w-100" style="margin-left: 0.5rem;">

                </div>

            </div>






        </form>
        <input type="hidden" name="hiddenIndicaConteudoNaTabelaFrotaContratada"
                       id="hiddenIndicaConteudoNaTabelaFrotaContratada" value="0">
        <div id="divTabelaFormLancFrotaContrat" class="form-group  cl_div_tabela_principal_pagina w-100">




        </div>
    </div>
</div>
