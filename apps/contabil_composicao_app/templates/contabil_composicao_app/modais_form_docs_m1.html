

<!-- Modal edita pac CONTAS A PAGAR/RECEBER -->
<div id="modal_edita_doc_pac_pagar_receber" role="dialog" class="modal">
    <div class="modal-dialog" style="max-width: 700px; width: 700px; height: 610px; border-radius: 10px;
        margin-left: 30px; margin-right: 30px; margin-top: 30px; margin-bottom: 30px;">
        <div class="modal-content">
            <div class="modal-header"
                 style="background-color:#f26522;height: 40px;padding-right: 5px;padding-bottom: 35px;
            padding-top: 10px;font-size:10px;">
                <div class="row" style="margin-left: 0px;margin-right: 0px;width: 1320px;margin-top: 35px;" >
                    <div class="col-md-6" align="left">
                        <p>
                            <i class="fa-solid fa-pen-to-square fa-2xl" style="color: #FFFFFF;"></i>
                            <span style="color:#ffffff; font-size:15px">Edita dados docs</span>
                        </p>
                    </div>
                    <div class="col-md-6" align="right">
                        <button type="button" name="btn_fecha_modal_edita_doc_pac_pagar_receber"
                                id="btn_fecha_modal_edita_doc_pac_pagar_receber"
                                class="btn btn-sm btn-rounded">
                            <i class="fa-solid fa-circle-xmark fa-2xl" style="color: #FFFFFF;"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="modal-body">
                <form id="frm_modal_edita_doc_pac_pagar_receber" name="frm_modal_edita_doc_pac_pagar_receber"
                      class="d-flex flex-column align-items-center justify-content-between"
                      method="POST">

                    <div class="d-flex justify-content-between align-items-between w-100">
                        <div class="d-flex flex-column w-100">
                            <label style="color: #000000;">
                                Filial
                            </label>
                            <select class="selectpicker form-control" id="sl_filial_doc_pac_pg_rb"
                                    name="sl_filial_doc_pac_pg_rb"
                                    style="color: #999999; font-size: 20px; height: 54.65px"
                                    data-live-search="true">
                                {% for f in lista_filiais %}
                                    <option value={{f.cod_reduzido}}>{{f.desc_filial}} - Cód. Red.: {{ f.cod_reduzido }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-between w-100">
                        <div class="d-flex flex-column" style="margin: 0.25rem; width: 30%;">
                            <label for="txt_cnpj_fornec_doc_pac_pg_rb" style="color: #000000;">
                                CNPJ Fornecedor
                            </label>
                            <input type="text" id="txt_cnpj_fornec_doc_pac_pg_rb" name="txt_cnpj_fornec_doc_pac_pg_rb"
                                   class="form-control">
                        </div>

                        <div class="d-flex flex-column w-100" style="margin: 0.25rem; width: 70%;">
                            <label for="txt_nome_fornec_doc_pac_pg_rb" style="color: #000000;">
                                Nome Fornecedor
                            </label>
                            <input type="text" id="txt_nome_fornec_doc_pac_pg_rb" name="txt_nome_fornec_doc_pac_pg_rb"
                                   class="form-control">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-between w-100">
                        <div class="d-flex flex-column w-100">
                            <label for="txt_doc_pac_pg_rb" style="color: #000000;">Nº Doc</label>
                            <input type="text" id="txt_doc_pac_pg_rb"
                                   name="txt_doc_pac_pg_rb" class="form-control">
                        </div>

                        <div class="d-flex flex-column w-100" >
                            <label for="txt_num_ap_doc_pac_pg_rb" style="color: #000000;">Nº AP</label>
                            <input type="text" id="txt_num_ap_doc_pac_pg_rb"
                                   name="txt_num_ap_doc_pac_pg_rb" class="form-control">
                        </div>

                        <div class="d-flex flex-column w-100">
                            <label for="dt_lanc_doc_pac_pg_rb" style="color: #000000;">Dt. Lançamento</label>
                            <input type="date" id="dt_lanc_doc_pac_pg_rb"
                                   name="dt_lanc_doc_pac_pg_rb" class="form-control">
                        </div>

                        <div class="d-flex flex-column w-100">
                            <label for="dt_venc_doc_pac_pg_rb" style="color: #000000;">Dt. Vencimento</label>
                            <input type="date" id="dt_venc_doc_pac_pg_rb"
                                   name="dt_venc_doc_pac_pg_rb" class="form-control">
                        </div>

                        <div class="d-flex flex-column w-100" >
                            <label for="num_parc_doc_pac_pg_rb" style="color: #000000;">Nº Parcela</label>
                            <input type="number" id="num_parc_doc_pac_pg_rb"
                                   name="num_parc_doc_pac_pg_rb" class="form-control">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-between w-100">
                        <div class="d-flex flex-column w-100">
                            <label for="num_val_rel_pac_pg_rb" style="color: #000000;">Val. Relatório</label>
                            <input type="number" id="num_val_rel_pac_pg_rb"
                                   name="num_val_rel_pac_pg_rb" class="form-control">
                        </div>

                        <div class="d-flex flex-column w-100" >
                            <label for="num_val_raz_doc_pac_pg_rb" style="color: #000000;">Val. Razão</label>
                            <input type="number" id="num_val_raz_doc_pac_pg_rb"
                                   name="num_val_raz_doc_pac_pg_rb" class="form-control">
                        </div>

                        <div class="d-flex flex-column w-100">
                            <label for="num_val_dif_doc_pac_pg_rb" style="color: #000000;">Val. Diferença</label>
                            <input type="number" id="num_val_dif_doc_pac_pg_rb"
                                   name="num_val_dif_doc_pac_pg_rb" class="form-control">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-between w-100">
                        <div class="d-flex flex-column w-100">
                            <label for="txt_obs_pac_pg_rb" style="color: #000000;">Obs.</label>
                            <input type="text" id="txt_obs_pac_pg_rb"
                                   name="txt_obs_pac_pg_rb" class="form-control">
                        </div>
                    </div>

                    <div class="mt-3 d-flex justify-content-between align-items-between w-100 mb-4" >
                        <div class="d-flex flex-column w-100">
                        </div>
                        <div class="d-flex flex-column w-100">
                        </div>
                        <div class="d-flex flex-column w-100">
                        </div>
                        <div class="d-flex flex-column w-100">
                            <button type='button' id="btn_confirma_update_doc_pac_pg_rb"
                                    name="btn_confirma_update_doc_pac_pg_rb"
                                    class="btn btn-primary btn-rounded botaoPrincipal" >
                                <i class="fa-solid fa-check" style="color:#2E8B57;"></i>
                                Atualizar
                            </button>
                        </div>
                    </div>

                </form>


            </div>
        </div>
    </div>
</div>
