{% load static %}

{% block link_static_css %}
    <link rel="stylesheet" href="{% static 'css/contabil_composicao_app/contabil_composicao_app.css' %}" />
    <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
    <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
    <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
{% endblock %}

<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-100">
    <div class="mt-3 d-flex align-items-start justify-content-between div_Titulo">
        <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-file-arrow-down fa-2xl" style="color: #f46424;"></i>
            <h1 class=" titlePadraoMenu">Importa Arquivo Contas Modelo 1</h1>
        </div>
        <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
    </div>

    <div class="containerApp">
        <form id="frm_imp_arquivo_conta_m1" name="frm_imp_arquivo_conta_m1"
              method="POST" enctype="multipart/form-data"
              class="d-flex flex-column align-items-center justify-content-between cl_frm_topo_paginas">
            {% csrf_token %}

            <div class="d-flex justify-content-between align-items-between w-100">
                <hr class="hr_title">
            </div>

            <div class="d-flex justify-content-between align-items-between w-100">
                <div class="d-flex flex-column w-100">
                    <input type="file" name="file_arquivo_conta_m1" id="file_arquivo_conta_m1"
                           class="containerApp"
                           placeholder='Selecione um arquivo 2art válido...'
                           accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"/>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-between w-100 mb-4 mt-3">
                <div class="d-flex flex-column w-100" style="margin-right: 0.25rem;">
                    <select class="selectpicker form-control cl_cb_contas" id="cb_contas_imp_arq_m1"
                        name="cb_contas_imp_arq_m1"
                        style="color: #999999; font-size: 20px; height: 54.65px"
                        data-live-search="true" title="Selecione a conta">
                    {% for conta in lista_contas %}
                        <option value="{{conta.cod_conta}}">
                            {{conta.desc_conta}} - Modelo {{conta.tipo_modelo}} -
                            Cód. red. CP - {{ conta.cod_red_conta_contabil_cp}} -
                            Cód. red. LP - {{ conta.cod_red_conta_contabil_lp}}
                        </option>
                    {% endfor %}
                </select>
                </div>
                <div class="d-flex flex-column w-100" style="margin-left: 0.25rem; margin-right: 0.25rem;">
                    <input type="month" id="dt_comp_imp_arq_contas_m1" class="form-control" name="dt_comp_imp_arq_contas_m1">
                </div>
                <div class="d-flex flex-column w-100" style="margin-left: 0.25rem; margin-right: 0.25rem;">
                    <button type="button" name="btn_imp_arquivo_conta_m1"
                            id="btn_imp_arquivo_conta_m1"
                            class="btn btn-primary btn-rounded botaoPrincipal">
                        <i class="fa-solid fa-file-import"></i>
                        Importar Arquivo
                    </button>
                </div>
                <div class="d-flex flex-column w-100" style="margin-left: 0.25rem;" id="div_btn_pesq_comp">

                </div>
            </div>


            <div class="d-flex justify-content-between align-items-between w-100 mb-3" >
                <div class="d-flex flex-column w-100 cl_div_loader">
                    <div class="loader" id="loader_frm_imp_arq_m1">
                        <div class="loader-inner">
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex flex-column w-100">
                    &nbsp;&nbsp;
                </div>
                <div id="div_desc_pacote_conta" class="d-flex flex-column w-100">
                    &nbsp;&nbsp;
                </div>

            </div>
            <input type="hidden" id="hd_tipo_pesquisa" />
            <div class="d-flex justify-content-between align-items-between w-100 mb-4" >
                <div id="div_campo_pesq_dados_pac_1" class="d-flex flex-column w-100" style="margin-right: 0.25rem;">
                </div>

                <div id="div_campo_pesq_dados_pac_2" class="d-flex flex-column w-100" style="margin-left: 0.25rem; margin-right: 0.25rem;">
                </div>

                <div id="div_campo_pesq_dados_pac_3" class="d-flex flex-column w-100" style="margin-left: 0.25rem; margin-right: 0.25rem;">
                </div>

                <div id="div_campo_pesq_dados_pac_4" class="d-flex flex-column w-100" style="margin-left: 0.25rem;margin-top: 0.125rem;">
                </div>
            </div>

        </form>
        <div id="div_tab_imp_doc_contas_modelo_1" class="form-group  cl_div_tabela_principal_pagina w-100">



        </div>
    </div>
</div>
