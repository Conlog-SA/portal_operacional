{% load static %}
<style type="text/css">
    .details-column-cp{
        background-color: #87CEEB;
        color: #000000;
    }
    .details-column-lp{
        background-color: #0d6efd;
        color: #000000;
    }
    .details-column-tt{
        background-color:var(--cor_empresa)!important;
        color: #000000;
    }

</style>


{% block link_static_css %}
    <link rel="stylesheet" href="{% static 'css/contabil_composicao_app/contabil_composicao_app.css' %}" />
{% endblock %}

<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-100">
    <div class="mt-3 d-flex align-items-center justify-content-between div_Titulo">
        <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-code-fork"></i>
            <h1 class=" titlePadraoMenu">{{desc_menu}}</h1>
        </div>
        {% if obj_usuario_logado.cod_filial.cod_empresa.cod_empresa == 12 %}
            <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
        {% else %}
            <img class="logo_cabecalho" src="{% static 'icons/logo-small-deep.png' %}" >
        {% endif %}
    </div>

    <div class="d-flex justify-content-between align-items-between div_Titulo_line">
        <hr class="hr_title">
    </div>


    <div class="containerApp">

        <form id="frm_conciliacao_com_benner" name="frm_conciliacao_com_benner"
              class="d-flex flex-column align-items-center justify-content-between cl_frm_topo_paginas"
              method="POST">
            <input type="hidden" id="hd_tipo_rel" value="R">

            <div class="d-flex justify-content-between align-items-between w-100">
                <div class="d-flex flex-column w-100 align-items-start">
                    <label for="cb_resp_contas_comp_detalhado">
                        Responsáveis contas
                        <button type='button' id="btn_marcar_resp_contas_comp_detalhado"
                                name="btn_marcar_resp_contas_comp_detalhado"
                                class="btn btn-rounded btn-space"
                                title="Selecionar todos os responsáveis"
                                style="width: 50px;">
                            <i class="fa-regular fa-square-check icon-color-e" ></i>
                        </button>
                        <button type='button' id="btn_desmarcar_resp_contas_comp_detalhado"
                                name="btn_desmarcar_resp_contas_comp_detalhado"
                                class="btn btn-rounded btn-space"
                                title="Limpar seleção"
                                style="width: 50px;">
                            <i class="fa-regular fa-square icon-color-e"></i>
                        </button>
                    </label>
                    <select class="selectpicker form-control cl_cb_contas" id="cb_resp_contas_comp_detalhado"
                            name="cb_resp_contas_comp_detalhado"
                            style="color: #999999; font-size: 20px; height: 54.65px"
                            multiple data-selected-text-format="count > 0"
                            data-live-search="true" title="Selecione um responsável das contas">
                        {% for usu in lista_usuarios_contabil %}
                            <option value="{{usu.nome_usu}}" selected>
                                Contas de : {{ usu.nome_usu }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-flex flex-column w-100 align-items-start" style="margin-left:0.25rem;margin-right: 0.25rem;">
                    <label for="cb_pac_contas_comp_detalhado">
                        Pacotes
                        <button type='button' id="btn_marcar_pac_contas_comp_detalhado"
                                name="btn_marcar_pac_contas_comp_detalhado"
                                class="btn btn-rounded btn-space"
                                title="Selecionar todos os responsáveis"
                                style="width: 50px;">
                            <i class="fa-regular fa-square-check icon-color-e"></i>
                        </button>
                        <button type='button' id="btn_desmarcar_pac_contas_comp_detalhado"
                                name="btn_desmarcar_pac_contas_comp_detalhado"
                                class="btn btn-rounded btn-space"
                                title="Limpar seleção"
                                style="width: 50px;">
                            <i class="fa-regular fa-square icon-color-e" ></i>
                        </button>
                    </label>
                    <select class="selectpicker form-control cl_cb_contas" id="cb_pac_contas_comp_detalhado"
                            name="cb_pac_contas_comp_detalhado"
                            style="color: #999999; font-size: 20px; height: 54.65px"
                            multiple data-selected-text-format="count > 0"
                            data-live-search="true" title="Selecione um responsável das contas">
                        {% for pac in lista_pacotes %}
                            <option value="{{pac.cod_pacote_conta}}" selected>
                                {{ pac.desc_pacote_conta }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="d-flex flex-column w-100 align-items-between">
                    <fieldset>
                        <legend style="font-size: 1.05rem;">Modelo</legend>
                        <div class="form-check-inline" style="font-size: 1.25rem;">
                            <label class="form-check-label">
                                <input type="radio" name="rd_modelo_conta_conc_comp_benner" class="form-check-input"
                                   id="rd_modelo_conta_conc_comp_benner_1">
                                Modelo 1
                            </label>
                        </div>

                        <div class="form-check-inline" style="font-size: 1.25rem;">
                            <label class="form-check-label">
                                <input type="radio" name="rd_modelo_conta_conc_comp_benner" class="form-check-input"
                                   id="rd_modelo_conta_conc_comp_benner_2">
                                Modelo 2
                            </label>
                        </div>

                        <div class="form-check-inline" style="font-size: 1.25rem;">
                            <label class="form-check-label">
                                <input type="radio" name="rd_modelo_conta_conc_comp_benner" class="form-check-input"
                                   id="rd_modelo_conta_conc_comp_benner_3">
                                Modelo 3
                            </label>
                        </div>
                    </fieldset>
                </div>

                <div class="d-flex flex-column w-100 align-items-start">
                    <label>
                        Contas
                        <button type='button' id="btn_marcar_contas_comp_benner"
                                name="btn_marcar_contas_comp_benner"
                                class="btn btn-rounded btn-space"
                                title="Selecionar todos os projetos"
                                style="width: 50px;">
                            <i class="fa-regular fa-square-check icon-color-e"></i>
                        </button>
                        <button type='button' id="btn_desmarcar_contas_comp_benner"
                                name="btn_desmarcar_contas_comp_benner"
                                class="btn btn-rounded btn-space"
                                title="Limpar seleção"
                                style="width: 50px;">
                            <i class="fa-regular fa-square icon-color-e"></i>
                        </button>
                    </label>
                    <select class="selectpicker form-control" id="cb_contas_conciliacao_comp_benner"
                            name="cb_contas_conciliacao_comp_benner"
                            multiple data-selected-text-format="count > 0"
                            style="color: #999999; font-size: 20px; height: 54.65px"
                            data-live-search="true"
                            title="Selecione o modelo das contas">

                    </select>

                </div>

                <div class="d-flex flex-column align-items-start w-100"
                     style="margin-top: 1.2rem;margin-left: 0.25rem;margin-right: 0.25rem">
                    <label>Competência</label>
                    <input type="month" class="form-control" id="dt_conciliacao_comp_benner" required>
                </div>


            </div>


            <div class="d-flex justify-content-between align-items-between w-100 mb-2 mt-3">

                <div class="d-flex justify-content-between align-items-between w-100 cl_div_loader_cad_comp_detalhada">
                    <div class="loader" id="loader_gera_comp_res">
                        <div class="loader-inner">
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                        </div>
                    </div>
                </div>

                <div class="d-flex flex-column align-items-end w-100">
                    <button type='button' id="btn_gera_conciliacao_comp_benner"
                            name="btn_gera_conciliacao_comp_benner"
                            class="btn btn-primary btn-rounded botaoPrincipal" >
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Gerar
                    </button>
                </div>
            </div>



        </form>

        <div class="form-group cl_div_tabela_principal_pagina w-100" style="height: 720px !important;">
            <div id="div_tab_conciliacao_composicao_benner" class="col-md-12 w-100 h-100" >

            </div>
        </div>

    </div>

</div>


{% include 'contabil_composicao_app/modais_frm_composicao.html' %}

<!-- <script src="{% static 'libs/bootstrap_4/js/bootstrap.min.js' %}"></script> -->
