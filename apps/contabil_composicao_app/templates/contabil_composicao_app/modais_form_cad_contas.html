                                    <i class="fa-regular fa-square" style="color: #f46424;"></i>
                                </button>
                                Desmarcar contas
                            </label>
                            <select class="selectpicker form-control" id="sl_contas_atualiza_contratos_benner"
                                    name="sl_contas_atualiza_contratos_benner"
                                    style="color: #999999; font-size: 20px; height: 54.65px"
                                    multiple data-selected-text-format="count > 0"
                                    data-live-search="true"
                                    title="Selecione as contas a atualizar">

                            </select>
                        </div>

                        <div class="d-flex flex-column" style="margin: 0.25rem; margin-top: 1rem; width: 20%;">

                            <input type="date" class="form-control" id="dt_data_corte_atualiza_ctr_parc_benner" name="dt_data_corte_atualiza_ctr_parc_benner">
                        </div>

                        <div class="d-flex flex-column" style="margin: 0.25rem; margin-top: 2.7rem; width: 20%;">
                            <button type="button" name="btn_atualiza_dados_contrato_benner"
                                    id="btn_atualiza_dados_contrato_benner"
                                    class="btn btn-primary btn-rounded botaoPrincipal">
                                <i class="fa-solid fa-check"></i>
                                Atualizar dados
                            </button>
                        </div>
                    </div>
                    <div class="d-flex justify-content-start align-items-start w-100">
                        <div class="loader" id="loader_frm_modal_atualiza_contratos_benner" style="margin-top: 0.5rem;">
                            <div class="loader-inner">
                                <div class="loader-block"></div>
                                <div class="loader-block"></div>
                                <div class="loader-block"></div>
                                <div class="loader-block"></div>
                                <div class="loader-block"></div>
                                <div class="loader-block"></div>
                                <div class="loader-block"></div>
                                <div class="loader-block"></div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-between w-100">
                        <div class="d-flex flex-column cl_div_tabela_principal_pagina" id="div_contratos_atualizados"
                             style="width: 98%; height: 40%; border-radius: 10px; margin: 1rem;">

                            <table id="tab_reg_atualizacao_benner"  class="display wrap w-100 cl_tab_principal_pagina">
                                <thead>
                                    <tr>
                                        <th scope="col"></th>
                                        <th scope="col">Cód. conta</th>
                                        <th scope="col">Conta</th>
                                        <th scope="col">Núm. contrato</th>
                                        <th scope="col">Núm. parcela</th>
                                        <th scope="col">Val. pago</th>
                                        <th scope="col">Val. principal</th>
                                        <th scope="col">Val. taxas</th>
                                        <th scope="col">Val. fundo</th>
                                        <th scope="col">Data vencimento</th>
                                        <th scope="col">Data liquidação</th>
                                        <th scope="col">Handle parcela</th>
                                      </tr>
                                </thead>
                                <tbody>

                                </tbody>

                            </table>


                        </div>
                    </div>
                </form>


            </div>
        </div>
    </div>
</div>
