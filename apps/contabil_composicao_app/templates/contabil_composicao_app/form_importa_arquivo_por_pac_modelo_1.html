{% load static %}

{% block link_static_css %}
    <link rel="stylesheet" href="{% static 'css/contabil_composicao_app/contabil_composicao_app.css' %}" />
    <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
    <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
    <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
{% endblock %}

<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-100">
    <div class="mt-3 d-flex align-items-start justify-content-between div_Titulo">
        <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-file-arrow-down fa-2xl" style="color: #f46424;"></i>
            <h1 class=" titlePadraoMenu">Importa Arquivo por Pacote Modelo 1</h1>
        </div>
        <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
    </div>

    <div class="containerApp">
        <form id="frm_imp_arquivo_pac_m1" name="frm_imp_arquivo_pac_m1"
              method="POST" enctype="multipart/form-data"
              class="d-flex flex-column align-items-center justify-content-between cl_frm_topo_paginas">
            {% csrf_token %}

            <div class="d-flex justify-content-between align-items-between w-100">
                <hr class="hr_title">
            </div>

            <div class="d-flex justify-content-start align-items-stretch w-100">
                <div class="d-flex flex-column" style="margin: 0.25rem; width: 35%;">
                    <select class="selectpicker form-control" id="cb_pacotes_imp_arq_m1"
                            name="cb_pacotes_imp_arq_m1"
                            style="color: #999999; font-size: 20px; height: 54.65px"
                            data-live-search="true" title="Selecione o pacote">
                        {% for pac in dic_pacotes %}
                            <option value="{{pac.cod_pacote_conta}}">
                                {{pac.desc_pacote_conta}}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="d-flex flex-column" style="margin: 0.25rem; width: 45%;">
                    <input type="file" name="file_arquivo_pac_m1" id="file_arquivo_pac_m1"
                           class="containerApp"
                           placeholder='Selecione um arquivo ...'
                           accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"/>
                </div>

                <div class="d-flex flex-column" style="margin: 0.25rem; width: 10%;">
                    <input type="month" id="dt_comp_imp_arq_contas_m1" class="form-control cl_dt_comp_imp_arq_contas_m1"
                           name="dt_comp_imp_arq_contas_m1">
                </div>

                <div class="d-flex flex-column" style="margin: 0.25rem; width: 10%;">
                    <button type="button" name="btn_imp_arquivo_pac_m1"
                            id="btn_imp_arquivo_pac_m1"
                            class="btn btn-primary btn-rounded botaoPrincipal">
                        <i class="fa-solid fa-file-import"></i>
                        Importar Arquivo
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-between mt-3 w-100">
                <i class="fa-solid fa-magnifying-glass" style="color: #f46424;"></i>
                CAMPOS PARA PESQUISA
            </div>
            <div class="d-flex justify-content-between align-items-between w-100">
                <hr class="hr_title">
            </div>


            <div class="d-flex justify-content-start align-items-start w-100">
                <div class="d-flex flex-column align-items-start" style="margin-right: 0.25rem;width: 79%;">
                    <label for="cb_contas_imp_arq_m1">
                        *Para pesquisar dados importados, informe a conta e a competência.
                    </label>
                    <select class="selectpicker form-control cl_cb_contas" id="cb_contas_imp_arq_m1"
                        name="cb_contas_imp_arq_m1"
                        style="color: #999999; font-size: 20px; height: 54.65px"
                        data-live-search="true" title="Selecione a conta">

                </select>
                </div>
                <div class="d-flex flex-column align-items-stretch"
                     style="margin-left: 0.25rem;margin-right: 0.25rem;margin-top: 1.5rem;width: 21%;">
                    <button type="button" name="btn_pesq_docs_arquivo_pac_m1"
                            id="btn_pesq_docs_arquivo_pac_m1"
                            class="btn btn-primary btn-rounded botaoPrincipal">
                        <i class="fa-solid fa-file-import"></i>
                        Pesquisa Docs Importados
                    </button>

                </div>

            </div>

            <div class="d-flex justify-content-start align-items-start w-100" >
                <div class="d-flex flex-column justify-content-start align-items-start w-100 cl_div_loader">

                </div>
            </div>

            <input type="hidden" id="hd_tipo_pesquisa" />
            <div class="d-flex justify-content-between align-items-between w-100 mb-4" >
                <div id="div_campo_pesq_dados_pac_1" class="d-flex flex-column w-100 cl_div_loader" style="margin-right: 0.25rem;">
                    <div class="loader" id="loader_frm_imp_arq_pac_m1">
                        <div class="loader-inner">
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                        </div>
                    </div>
                </div>

                <div id="div_campo_pesq_dados_pac_2" class="d-flex flex-column w-100" style="margin-left: 0.25rem; margin-right: 0.25rem;">
                </div>

                <div id="div_campo_pesq_dados_pac_3" class="d-flex flex-column w-100" style="margin-left: 0.25rem; margin-right: 0.25rem;">
                </div>

                <div id="div_campo_pesq_dados_pac_4" class="d-flex flex-column align-items-stretch w-100"
                     style="margin-left: 0.25rem;margin-top: 0.125rem;">
                </div>
            </div>

        </form>
        <div id="div_tab_imp_doc_pac_modelo_1" class="form-group  cl_div_tabela_principal_pagina w-100">



        </div>
    </div>
</div>
