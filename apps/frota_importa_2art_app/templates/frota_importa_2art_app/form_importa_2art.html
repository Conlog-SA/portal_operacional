{% load static %}

{% block link_static_css %} 
  <link rel="stylesheet" href="{% static 'css/cores.css' %}" />
  <link rel="stylesheet" href="{% static 'css/frota_app/importa_2art.css' %}" />
  <link rel="stylesheet" href="{% static 'css/toggle_switch.css' %}" />
  <link rel="stylesheet" href="{% static 'css/loader.css' %}" />
{% endblock %}


<div class="d-flex flex-column h-100 align-items-center justify-content-start text-white w-100">
    <div class="mt-3 d-flex align-items-start justify-content-between div_Titulo">
        <div class="d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-file-import fa-2xl" alt="Importar 2artd" style="color: #f46424;"></i>
            <h1 class=" titlePadraoMenu">{{desc_menu}}</h1>
        </div>
        <img class="logo_cabecalho" src="{% static 'icons/logo-branca.png' %}" >
    </div>
	<div class="d-flex justify-content-between align-items-between div_Titulo_line">
		<hr class="hr_title">
	</div>


    <div class="containerApp">
        <form id="form_upload_2art" name="form_upload_2art"  method="POST"
              class="d-flex flex-column align-items-center justify-content-between cl_frm_topo_paginas"
              enctype="multipart/form-data">
            {% csrf_token %}


            <div class="d-flex justify-content-between align-items-between w-100">
                <input type="file" name="fl_campo_arquivo_2art" id="fl_campo_arquivo_2art" class="containerApp"
                   placeholder='Selecione um arquivo 2art válido...'
                   accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"/>
            </div>

            <div class="d-flex justify-content-between align-items-between w-100 mb-4">
                <div class="d-flex align-items-end w-100 cl_div_loader">
                    <div class="loader" id="loader_imp_2art">
                        <div class="loader-inner">
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                            <div class="loader-block"></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex align-items-end w-100">
                    &nbsp;&nbsp;
                </div>
                <div class="d-flex align-items-end w-100">
                    &nbsp;&nbsp;
                </div>
            </div>

        </form>

        <div class="form-group cl_div_tabela_principal_pagina w-100">

            <div class="col-md-12 w-100 h-100">
                <table id="tab_mapas_nao_importados_2art"  class="display wrap w-100 cl_tab_principal_pagina">
                    <thead>
                        <tr>
                            <th scope="col">Status</th>
                            <th scope="col">Mapa/Data</th>
                        </tr>
                    </thead>

                    <tbody id="tBody2Art">

                    </tbody>

                </table>
            </div>
        </div>

    </div>

</div>

<script src="{% static 'controllers/frota_importa_2art_app/form_importa_2art_controller.js' %}"></script>
