{% load static %}

<!-- Modal Confirma Exclusão Excecao -->
<div id="modal_confirma_exclusao_excecao" role="dialog" class="modal">
  <div class="modal-dialog" style="border-radius: 10px;width: 530px;">
    <div class="modal-content" >
      <div class="modal-header"
           style="background-color:var(--cor_empresa_hover) !important;height: 40px;padding-right: 5px;padding-bottom: 35px;
                        padding-top: 10px;font-size:10px;">
        <div class="row"
             style="margin-left: 0px; margin-right: 0px; margin-bottom: 0px; width: 100%;
                            height: 30px;margin-top: 35px;" >
          <div class="col-md-6" align="left">
            <p>
              <i class="fa-solid fa-trash fa-2xl" style="color: #FFFFFF;"></i>
            <span style="color:#ffffff; font-size:12px">Desvincula Roteiro Peça</span>
            </p>

          </div>
          <div class="col-md-6" align="right">
            <button type="button" name="bnt_fecha_modal_confirma_exclusao_excecao"
                    id="bnt_fecha_modal_confirma_exclusao_excecao"
                    data-dismiss="modal" aria-hidden="true" class="btn btn-sm btn-rounded">
                <i class="fa-solid fa-circle-xmark fa-2xl" style="color: #FFFFFF !important;"></i>
            </button>

          </div>
        </div>
      </div>
      <div class="modal-body">
        <form name="form_informa_param_gerar_disp_emp" id="form_informa_param_gerar_disp_emp"
                    method="post" class="d-flex flex-column align-items-center justify-content-between">

          <div class="d-flex justify-content-between align-items-between w-100">
            <div class="d-flex flex-column w-100">
              <p style="color:#000000;">Tem certeza que deseja que deseja excluir a exceção ?</p>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-between w-100">
            <div class="d-flex flex-column w-100">
              <button type="button" name="btn_excluir_excecao_operacao"
                        id="btn_excluir_excecao_operacao"
                        class="btn btn-primary btn-rounded botaoPrincipal" >
                    <i class="fa-solid fa-check"></i>
                  Excluir Exceção
              </button>
            </div>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>


<!-- Modal Add Justificativa nota trtada -->
<div id="modal_add_justificativa_nota_tratada" role="dialog" class="modal">
  <div class="modal-dialog" style="border-radius: 10px;max-width: 530px;width:530px;">
    <div class="modal-content">
      <div class="modal-header"
           style="background-color:var(--cor_empresa_hover) !important;;height: 40px;padding-right: 5px;padding-bottom: 35px;
                    padding-top: 10px;font-size:10px;">
        <div class="row"
             style="margin-left: 0px; margin-right: 0px; margin-bottom: 0px;
                    width: 530px; height: 30px;margin-top: 35px;" >
          <div class="col-md-6" align="left">
            <p>
              <i class="fa-solid fa-pen-to-square fa-2xl" style="color: #FFFFFF !important;"></i>
              <span style="color:#ffffff; font-size:12px">&nbsp;&nbsp;Justificar Nota Tratada</span>
            </p>
          </div>
          <div class="col-md-6" align="right">
            <button type="button" id="bnt_fecha_modal_add_justificativa_nota_tratada"
                    name="bnt_fecha_modal_add_justificativa_nota_tratada"
                    data-dismiss="modal" aria-hidden="true" class="btn btn-sm btn-rounded">
                <i class="fa-solid fa-circle-xmark" style="color: #FFFFFF !important;"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="modal-body">
        <form name="form_os_benner_vincular_apontamento" id="form_os_benner_vincular_apontamento"
                      class="d-flex flex-column align-items-center justify-content-between" method="post">
          <input type="hidden" id="hd_tipo_transacao"/>
          <div class="mt-3 d-flex flex-column w-100">
              <div class="d-flex flex-column w-100">
                <label for="txt_area_justificativa_nota_tratada" class="label_comp_forms">
                  Coloque aqui a justificativa
                </label>
                <textarea class="form-control" id="txt_area_justificativa_nota_tratada"
                        name="txt_area_justificativa_nota_tratada"
                        autocomplete="off" rows="2" cols="33">
                </textarea>
              </div>
          </div>

          <div class="mt-3 d-flex justify-content-between align-items-between w-100">
              <div id="div_dados_header_modal_os_benner_vincular_apontamento"
                   class="d-flex flex-column w-100">
                <button type='button' class='btn btn-primary btn-rounded botaoPrincipal'
                        id="btn_confirma_justificativa_nota_tratada"
                      name="btn_confirma_justificativa_nota_tratada" >
                    <i class="fa-solid fa-check"></i>
                    Justificar
                </button>
              </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
